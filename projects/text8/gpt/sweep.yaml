# GPT has no from_variant, so architecture (n-layer/n-embd/...) is fixed via the
# train.py defaults and only optimizer/data hyperparameters are swept here.
# early_terminate is omitted: hyperband prunes on intermediate report points, but
# with --epochs 1 val/loss is logged only once (at epoch end), so there is nothing
# to prune on. bayes still applies -- it optimizes across runs, each of which
# contributes a single final val/loss.
program: projects/text8/gpt/train.py
project: text8-gpt
method: bayes
metric:
  name: val/loss
  goal: minimize
parameters:
  lr:
    distribution: log_uniform_values
    min: 0.005
    max: 0.05
  batch-size:
    values: [16, 32, 64]
  warmup-steps:
    values: [50, 100, 200]
command:
  - ${env}
  - ${interpreter}
  - ${program}
  - ${args}

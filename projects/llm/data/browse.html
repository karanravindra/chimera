<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Chimera · data browser</title>
<style>
  :root{
    --bg:#0d1117; --panel:#161b22; --panel2:#1c2330; --border:#2b3444;
    --ink:#e6edf3; --muted:#8b98a9; --accent:#6ea8fe; --code:#0b0f16;
    --code-c:#58a6ff; --web-c:#3fb950; --math-c:#d29922; --tools-c:#bc8cff;
  }
  *{box-sizing:border-box}
  html,body{height:100%}
  body{margin:0;background:var(--bg);color:var(--ink);
    font:14px/1.55 -apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif}
  [x-cloak]{display:none!important}
  .app{display:grid;grid-template-columns:280px 1fr;height:100vh}
  /* sidebar */
  aside{background:var(--panel);border-right:1px solid var(--border);overflow-y:auto;padding:16px}
  aside h1{font-size:15px;margin:0 0 2px;letter-spacing:.02em}
  aside .sub{color:var(--muted);font-size:12px;margin-bottom:16px}
  .srcbtn{display:block;width:100%;text-align:left;background:transparent;border:1px solid transparent;
    color:var(--ink);border-radius:8px;padding:8px 10px;cursor:pointer;margin-bottom:3px;font-size:13px}
  .srcbtn:hover{background:var(--panel2)}
  .srcbtn.active{background:var(--panel2);border-color:var(--accent)}
  .srcbtn .t{display:flex;justify-content:space-between;align-items:center;gap:8px}
  .srcbtn .cnt{color:var(--muted);font-size:11px;font-family:ui-monospace,monospace}
  .srcbtn .repo{color:var(--muted);font-size:11px;font-family:ui-monospace,monospace;
    overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
  .dot{width:8px;height:8px;border-radius:99px;display:inline-block;flex:none}
  .code .dot,.dot.code{background:var(--code-c)} .web .dot,.dot.web{background:var(--web-c)}
  .math .dot,.dot.math{background:var(--math-c)} .tools .dot,.dot.tools{background:var(--tools-c)}
  .cathead{font-size:11px;text-transform:uppercase;letter-spacing:.08em;color:var(--muted);
    margin:14px 0 6px;padding-left:2px}
  /* main */
  main{overflow-y:auto;padding:0}
  .topbar{position:sticky;top:0;z-index:5;background:rgba(13,17,23,.92);backdrop-filter:blur(6px);
    border-bottom:1px solid var(--border);padding:14px 24px;display:flex;
    justify-content:space-between;align-items:center;gap:16px;flex-wrap:wrap}
  .topbar .meta h2{margin:0;font-size:16px}
  .topbar .meta .notes{color:var(--muted);font-size:12px;max-width:640px;margin-top:2px}
  .nav{display:flex;align-items:center;gap:8px;flex:none}
  .nav button{background:var(--panel2);border:1px solid var(--border);color:var(--ink);
    border-radius:8px;padding:6px 12px;cursor:pointer;font-size:13px}
  .nav button:hover:not(:disabled){border-color:var(--accent)}
  .nav button:disabled{opacity:.4;cursor:default}
  .nav .pos{color:var(--muted);font-size:13px;font-family:ui-monospace,monospace;min-width:74px;text-align:center}
  .body{padding:24px;max-width:1000px}
  .docmeta{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:14px;font-size:12px;color:var(--muted)}
  .chip{background:var(--panel2);border:1px solid var(--border);border-radius:99px;padding:2px 10px}
  .chip.k{font-family:ui-monospace,monospace}
  .doc{background:var(--code);border:1px solid var(--border);border-radius:10px;padding:18px 20px;
    white-space:pre-wrap;word-break:break-word;
    font:13px/1.6 ui-monospace,SFMono-Regular,Menlo,Consolas,monospace;color:#c9d4e0}
  .doc .more{color:var(--muted);font-style:italic}
  /* tags */
  .tagbar{margin-top:18px;padding-top:16px;border-top:1px solid var(--border)}
  .tagbar h3{font-size:12px;text-transform:uppercase;letter-spacing:.06em;color:var(--muted);margin:0 0 8px}
  .tags{display:flex;flex-wrap:wrap;gap:6px;align-items:center}
  .tagpill{display:inline-flex;align-items:center;gap:6px;background:var(--panel2);
    border:1px solid var(--border);border-radius:99px;padding:3px 6px 3px 11px;font-size:12px}
  .tagpill button{background:none;border:0;color:var(--muted);cursor:pointer;font-size:14px;line-height:1;padding:0 2px}
  .tagpill button:hover{color:var(--ink)}
  .taginput{background:var(--panel2);border:1px solid var(--border);color:var(--ink);
    border-radius:99px;padding:4px 12px;font-size:12px;min-width:130px;outline:none}
  .taginput:focus{border-color:var(--accent)}
  .suggest{display:flex;gap:6px;flex-wrap:wrap;margin-top:8px}
  .suggest button{background:transparent;border:1px dashed var(--border);color:var(--muted);
    border-radius:99px;padding:2px 10px;font-size:12px;cursor:pointer}
  .suggest button:hover{border-color:var(--accent);color:var(--ink)}
  .note{color:var(--muted);font-size:11px;margin-top:10px;font-style:italic}
  .err{color:#f85149;padding:24px}
</style>
</head>
<body>
<div class="app" x-data="browser()" x-cloak>
  <!-- sidebar -->
  <aside>
    <h1>Chimera · data</h1>
    <div class="sub">Pretraining mixture · browse document by document</div>
    <template x-for="cat in catOrder" :key="cat">
      <div x-show="grouped[cat]">
        <div class="cathead" x-text="catLabel[cat] + ' · ' + catPct(cat) + '%'"></div>
        <template x-for="(s,i) in grouped[cat]" :key="s.key">
          <button class="srcbtn" :class="[s.category, {active: s.key===current.key}]"
                  @click="select(s.key)">
            <div class="t">
              <span><span class="dot"></span>&nbsp;<span x-text="s.title"></span></span>
              <span class="cnt" x-text="s.docs.length"></span>
            </div>
            <div class="repo" x-text="s.hf_repo"></div>
          </button>
        </template>
      </div>
    </template>
  </aside>

  <!-- main -->
  <main>
    <div class="topbar">
      <div class="meta">
        <h2><span class="dot" :class="current.category"></span>&nbsp;<span x-text="current.title"></span></h2>
        <div class="notes" x-text="current.notes"></div>
      </div>
      <div class="nav">
        <button @click="prev()" :disabled="pos===0">&larr; Prev</button>
        <span class="pos" x-text="(pos+1) + ' / ' + current.docs.length"></span>
        <button @click="next()" :disabled="pos>=current.docs.length-1">Next &rarr;</button>
      </div>
    </div>

    <div class="body" x-show="current.docs.length">
      <div class="docmeta">
        <span class="chip k" x-text="current.key"></span>
        <span class="chip" x-text="catLabel[current.category]"></span>
        <span class="chip" x-text="'kind: ' + current.kind"></span>
        <span class="chip" x-text="doc.chars.toLocaleString() + ' chars'"></span>
        <template x-for="(v,k) in cleanMeta(doc.meta)" :key="k">
          <span class="chip" x-text="k + ': ' + v"></span>
        </template>
      </div>

      <div class="doc"><span x-text="doc.text"></span><template x-if="doc.truncated"><span class="more">
… (truncated for display)</span></template></div>

      <!-- tagging (UI only) -->
      <div class="tagbar">
        <h3>Tags</h3>
        <div class="tags">
          <template x-for="tag in tags" :key="tag">
            <span class="tagpill"><span x-text="tag"></span>
              <button @click="removeTag(tag)" title="remove">&times;</button></span>
          </template>
          <input class="taginput" type="text" placeholder="add tag + Enter"
                 x-model="draft" @keydown.enter.prevent="addTag()">
        </div>
        <div class="suggest">
          <template x-for="s in suggestions" :key="s">
            <button @click="addTag(s)" x-show="!tags.includes(s)" x-text="'+ ' + s"></button>
          </template>
        </div>
        <div class="note">Tags are stored in-page only (per document, this session) — nothing is written to disk yet.</div>
      </div>
    </div>

    <div class="err" x-show="!current.docs.length"
         x-text="current.error ? ('Failed to sample this source: ' + current.error) : 'No documents.'"></div>
  </main>
</div>

fa y\u00fan \",\"Tag\":null,\"Explanation\":null,\"English\":null,\"Sort\":2,\"Dynasty\":\"\u660e\"},{\"Id\":6264216,\"Sentence\":\"\u64e2\u6b4c\u4e5d\u66f2\u5e94\u8c01\u548c\uff0c\u72ec\u501a\u79cb\u98ce\u540a\u4e8c\u541b\u3002\",\"Rank\":0,\"PoetryId\":null,\"Pinyin\":\"zhu\u00f3 g\u0113 jiu q\u016b y\u012bng sh\u00e9i h\u00e9 \uff0cd\u00fa yi q\u012bu f\u0113ng di\u00e0o \u00e8r j\u016bn \",\"Tag\":null,\"Explanation\":null,\"English\":null,\"Sort\":3,\"Dynasty\":\"\u660e\"}]}", "truncated": false, "chars": 1117, "meta": {"path": "/\u660e/\u9646\u6df1/1c139bcc50b61b3edabe9e709015615f/content.json", "language": "JSON", "length_bytes": 1459}}, {"text": "{\"annee\": \"143\", \"cour\": \"V\", \"page\": \"385\", \"date\": \"26/10/2017\", \"cite\": [\"113 V 127\", \"132 V 215\", \"141 III 112\"], \"cite_par\": [\"145 V 188\"], \"chapeau\": \"40. Extrait de l'arr\u00eat de la Ire Cour de droit social dans la cause A. contre Zurich Compagnie d'Assurances (recours en mati\u00e8re de droit public)\\n\\n8C_617/2016 du 26 octobre 2017\", \"regestes\": [\"Art. 3 al. 2 LAA (dans sa teneur valable jusqu'au 31 d\u00e9cembre 2016); art. 7 al. 1 let. b OLAA; art. 324a al. 1 CO; fin de la couverture d'assurance. Les indemnit\u00e9s vers\u00e9es par l'assurance-maladie ne sont r\u00e9put\u00e9es salaires que lorsqu'elles remplacent le salaire d\u00fb par l'employeur en vertu de l'art. 324a CO. La question du droit au salaire est ainsi d\u00e9terminante pour fixer la nature des indemnit\u00e9s journali\u00e8res vers\u00e9es par l'assurance-maladie. Elle l'est \u00e9galement lorsqu'il s'agit de fixer le moment de la fin du droit \u00e0 la couverture d'assurance-accidents. Lorsque l'employeur d\u00e9roge au r\u00e9gime de base l\u00e9gal pr\u00e9vu par l'art. 324a al. 1 et 2 CO, les indemnit\u00e9s journali\u00e8res doivent \u00eatre consid\u00e9r\u00e9es comme des prestations vers\u00e9es en lieu et place du salaire conform\u00e9ment \u00e0 l'art. 7 al. 1 let. b OLAA aussi longtemps qu'elles sont dues selon le contrat d'assurance, mais au plus tard \u00e0 la cessation des rapports de travail (consid. 4). En l'esp\u00e8ce, il y a lieu d'admettre que les parties avaient conclu un contrat de travail de dur\u00e9e d\u00e9termin\u00e9e qui avait pris fin avant l'\u00e9puisement du droit aux indemnit\u00e9s journali\u00e8res en cas de maladie.\"], \"faits\": \"|386|\\n\\nA. A., n\u00e9e en 1972, a \u00e9t\u00e9 victime d'un accident de la circulation le 3 juillet 2010. Alors qu'elle circulait \u00e0 V., son v\u00e9hicule a \u00e9t\u00e9 percut\u00e9 par l'arri\u00e8re. Elle a \u00e9t\u00e9 bless\u00e9e au bras et au genou gauches. Le 7 f\u00e9vrier 2011, par l'interm\u00e9diaire de son avocat, elle a \u00e9crit \u00e0 la Zurich Compagnie d'Assurances SA (ci-apr\u00e8s: la Zurich) qu'elle avait \u00e9t\u00e9 employ\u00e9e comme ouvri\u00e8re agricole par l'entreprise B., \u00e0 W., entreprise qui avait \u00e9t\u00e9 reprise entretemps par D. et dont le personnel \u00e9tait obligatoirement assur\u00e9 aupr\u00e8s de cette compagnie d'assurances.\\n\\nLe 28 novembre 2011, la Zurich a fait savoir \u00e0 l'int\u00e9ress\u00e9e que, selon les informations qu'elle avait recueillies, celle-ci n'avait jamais travaill\u00e9 pour le preneur d'assurances l'entreprise B. Selon un rapport d'employeur \u00e0 l'intention de l'assurance-invalidit\u00e9 du 5 mai 2010, il est toutefois apparu que l'int\u00e9ress\u00e9e avait travaill\u00e9 deux jours au d\u00e9but du mois d'ao\u00fbt 2008 pour l'entreprise B. L'horaire de travail normal dans l'entreprise et celui de la personne assur\u00e9e avant l'atteinte \u00e0 la sant\u00e9 \u00e9tait de 47 heures et demie par semaine. L'employeur pr\u00e9cisait: \\\"Cet horaire est valable de ao\u00fbt \u00e0 octobre. Le reste de l'ann\u00e9e, travail irr\u00e9gulier\\\". Il \u00e9tait indiqu\u00e9 que l'employ\u00e9e avait touch\u00e9 des indemnit\u00e9s journali\u00e8res pour perte de gain du 27 ao\u00fbt au 31 octobre 2008.\\n\\nEntendu le 3 avril 2012 par un inspecteur de la Zurich, l'employeur a confirm\u00e9 que l'int\u00e9ress\u00e9e avait bien \u00e9t\u00e9 engag\u00e9e, le 25 ao\u00fbt 2008, et qu'elle avait exerc\u00e9 son activit\u00e9 professionnelle les 25 et 26 ao\u00fbt |387| avant d'\u00eatre en arr\u00eat de travail. Il a pr\u00e9cis\u00e9 qu'il n'y avait pas eu de contrat \u00e9crit et que les travailleurs saisonniers \u00e9taient engag\u00e9s pour la p\u00e9riode des r\u00e9coltes, en principe de d\u00e9but ao\u00fbt \u00e0 fin octobre. D'autre part, selon les renseignements obtenus aupr\u00e8s de CSS Assurance, celle-ci a vers\u00e9 des indemnit\u00e9s journali\u00e8res en cas de maladie en faveur de l'employ\u00e9e, tout d'abord en mains de l'employeur jusqu'au 31 octobre 2008, puis directement en mains de la b\u00e9n\u00e9ficiaire \u00e0 partir du 1er novembre 2008 jusqu'au 2 novembre 2010.\\n\\nPar d\u00e9cision du 28 janvier 2014, confirm\u00e9e par une d\u00e9cision sur opposition du 23 avril suivant, la Zurich a refus\u00e9 d'accorder \u00e0 A. des prestations au titre de l'assurance obligatoire contre les accidents au motif que les rapports de travail avaient dur\u00e9 moins de trois mois si bien que l'employ\u00e9e ne pouvait pr\u00e9tendre au versement du salaire \u00e0 compter de son incapacit\u00e9 de travail. Les indemnit\u00e9s journali\u00e8res vers\u00e9es par l'assureur-maladie ne pouvaient donc pas \u00eatre consid\u00e9r\u00e9es comme un salaire de remplacement.\\n\\nB. Par jugement du 13 juillet 2016, la Cour des assurances sociales du Tribunal cantonal du Valais a rejet\u00e9 le recours form\u00e9 contre la d\u00e9cision sur opposition par A.\\n\\nC. Celle-ci forme un recours en mati\u00e8re de droit public dans lequel elle demande au Tribunal f\u00e9d\u00e9ral de reconna\u00eetre sa qualit\u00e9 d'assur\u00e9e aupr\u00e8s de la Zurich pour les cons\u00e9quences de l'accident du 3 juillet 2010 et de dire que cet assureur doit lui verser les prestations l\u00e9gales.\\n\\nLa Zurich a renonc\u00e9 \u00e0 d\u00e9poser une r\u00e9ponse. L'office f\u00e9d\u00e9ral de la sant\u00e9 publique ne s'est pas d\u00e9termin\u00e9.\\n\\nLe Tribunal f\u00e9d\u00e9ral a rejet\u00e9 le recours.\", \"considerants\": \"Extrait des consid\u00e9rants:\\n\\n2. Il est admis en l'esp\u00e8ce que la recourante a b\u00e9n\u00e9fici\u00e9 d'indemnit\u00e9s journali\u00e8res en vertu d'un contrat d'assurance collective conclu par son employeur d\u00e8s la fin du mois d'ao\u00fbt 2008 jusqu'au 2 novembre 2010.\\n\\nL'art. 3 al. 2 LAA (dans sa teneur valable jusqu'au 31 d\u00e9cembre 2016 et applicable en l'occurrence [cf. ATF 132 V 215 consid. 5.1.1 p. 219 et les arr\u00eats cit\u00e9s; ch. 1 des dispositions transitoires relatives \u00e0 la modification de la LAA du 25 septembre 2015]) dispose que l'assurance-accidents obligatoire cesse de produire ses effets \u00e0 l'expiration du trenti\u00e8me jour qui suit celui o\u00f9 a pris fin le droit au demi-salaire |388| au moins. Le Conseil f\u00e9d\u00e9ral r\u00e8gle les r\u00e9mun\u00e9rations et les prestations de remplacement qui doivent \u00eatre consid\u00e9r\u00e9es comme salaire, la forme et le contenu des conventions sur la prolongation de l'assurance ainsi que le maintien de l'assurance en cas de ch\u00f4mage (art. 3 al. 5 LAA, dans sa version en vigueur jusqu'au 31 d\u00e9cembre 2016).\\n\\nEn vertu de cette d\u00e9l\u00e9gation de comp\u00e9tence, l'autorit\u00e9 ex\u00e9cutive a \u00e9dict\u00e9 l'art. 7 OLAA (RS 832.202), intitul\u00e9 \\\"Fin de l'assurance \u00e0 l'extinction du droit au salaire\\\", dont l'alin\u00e9a 1er a la teneur suivante:\\n\\n1 Sont r\u00e9put\u00e9s salaire, au sens de l'art. 3, a", "truncated": true, "chars": 19250, "meta": {"path": "/143/143-V-385.json", "language": "JSON", "length_bytes": 19853}}, {"text": "{\n  \"identify\": \"SLD-93-\u6613-477-20041124-1\",\n  \"court\": {\n    \"name\": \"\u81fa\u7063\u58eb\u6797\u5730\u65b9\u6cd5\u9662\",\n    \"code\": \"SLD\"\n  },\n  \"division\": {\n    \"name\": \"\u5211\u4e8b\",\n    \"code\": \"M\"\n  },\n  \"year\": 93,\n  \"word\": \"\u6613\",\n  \"number\": \"477\",\n  \"jcheck\": \"1\",\n  \"reason\": \"\u50b7\u5bb3\u7b49\",\n  \"content\": \"\u81fa\u7063\u58eb\u6797\u5730\u65b9\u6cd5\u9662\u5211\u4e8b\u5224\u6c7a                          \u4e5d\u5341\u4e09\u5e74\u5ea6\u6613\u5b57\u7b2c\u56db\u4e03\u4e03\u865f\\n    \u516c  \u8a34  \u4eba  \u81fa\u7063\u58eb\u6797\u5730\u65b9\u6cd5\u9662\u6aa2\u5bdf\u7f72\u6aa2\u5bdf\u5b98\\n    \u88ab      \u544a  \u4e19\u25cb\u25cb\\n\u53f3\u5217\u88ab\u544a\u56e0\u50b7\u5bb3\u7b49\u6848\u4ef6\uff0c\u7d93\u6aa2\u5bdf\u5b98\u8072\u8acb\u7c21\u6613\u5224\u6c7a\u8655\u5211\uff08\u4e5d\u5341\u4e8c\u5e74\u5ea6\u5075\u5b57\u7b2c\u4e00\uff10\u4e03\u4e00\u4e03\\n\u865f\uff09\uff0c\u672c\u9662\u5167\u6e56\u7c21\u6613\u5ead\u8a8d\u4e0d\u5b9c\u884c\u7c21\u6613\u5224\u6c7a\u8655\u5211\uff08\u4e5d\u5341\u4e09\u5e74\u5ea6\u6e56\u7c21\u5b57\u7b2c\u4e00\u516b\u865f\uff09\uff0c\u7c3d\u7531\\n\u672c\u9662\u6539\u4f9d\u901a\u5e38\u7a0b\u5e8f\u5be9\u7406\uff0c\u672c\u9662\u7d93\u8a0a\u554f\u88ab\u544a\u5f8c\uff0c\u88ab\u544a\u70ba\u8a8d\u7f6a\u4e4b\u7b54\u8faf\uff0c\u8a8d\u70ba\u5b9c\u4ee5\u7c21\u5f0f\u5be9\u5224\\n\u7a0b\u5e8f\u5be9\u7406\u4e26\u5224\u6c7a\u5982\u5de6\uff1a\\n    \u4e3b  \u6587\\n\u4e19\u25cb\u25cb\u50b7\u5bb3\u4eba\u4e4b\u8eab\u9ad4\uff0c\u8655\u62d8\u5f79\u4f0d\u62fe\u7396\u65e5\uff0c\u5982\u6613\u79d1\u7f70\u91d1\u4ee5\ue372\u4f70\u5143\u6298\u7b97\u58f9\u65e5\u3002\\n    \u4e8b  \u5be6\\n\u4e00\u7de3\u4e19\u25cb\u25cb\u4e4b\u59bb\u4e01\u25cb\u25cb\u59d4\u4efb\u4ee3\u7406\u4eba\u694a\u7f8e\u96f2\uff0c\u65bc\u6c11\u570b\u4e5d\u5341\u4e8c\u5e74\u4e5d\u6708\u5341\u516b\u65e5\u53c3\u52a0\u672c\u9662\u4e5d\u5341\\n  \u5e74\u5ea6\u57f7\u5b57\u7b2c\u4e00\u4e09\uff10\u4e94\u4e00\u865f\uff0c\u50b5\u6b0a\u4eba\u7b2c\u4e00\u5546\u696d\u9280\u884c\u80a1\u4efd\u6709\u9650\u516c\u53f8\u8072\u8acb\u62cd\u8ce3\u50b5\u52d9\u4eba\u53e4\u5149\\n  \u5b87\u6240\u6709\u9580\u724c\u865f\u78bc\u53f0\u5317\u7e23\u6c50\u6b62\u5e02\u25cb\u25cb\u8def\u4e8c\u4e00\u56db\u5df7\u5341\u4e8c\u865f\u4e00\u81f3\u56db\u6a13\u5efa\u7269\uff0c\u53ca\u8a72\u5efa\u7269\u5ea7\u843d\\n  \u4e4b\u53f0\u5317\u7e23\u6c50\u6b62\u5e02\u25cb\u25cb\u25cb\u6bb5\u8eca\u576a\u5bee\u5c0f\u6bb5\u4e00\u516d\u516d\u2500\u4e09\u516d\u4e8c\u5730\u865f\u571f\u5730\u5f37\u5236\u57f7\u884c\u6848\u4ef6\u4e4b\u7af6\u6a19\\n  \uff0c\u4e01\u25cb\u25cb\u4ee5\u65b0\u53f0\u5e63\uff08\u4e0b\u540c\uff09\u4e03\u767e\u4e94\u5341\u516b\u842c\u516b\u5343\u5143\u5f97\u6a19\uff0c\u4e26\u65bc\u540c\u5e74\u6708\u4e8c\u5341\u56db\u65e5\u7e73\u7d0d\u50f9\\n  \u6b3e\uff0c\u65cb\u7d93\u672c\u9662\u767c\u4e88\u6b0a\u5229\u79fb\u8f49\u8b49\u66f8\uff0c\u800c\u70ba\u4e0a\u958b\u623f\u5730\u4e4b\u6240\u6709\u6b0a\u4eba\u3002\u56e0\u620a\u25cb\u25cb\uff08\u6240\u6d89\u6050\u5687\\n  \u3001\u50b7\u5bb3\u72af\u884c\u53e6\u884c\u5be9\u7d50\uff09\u5bb6\u4eba\u5c45\u4f4f\u5728\u4e01\u25cb\u25cb\u6a19\u5f97\u4e4b\u524d\u958b\u623f\u5730\u5167\uff0c\u4e19\u25cb\u25cb\u70ba\u80fd\u65e9\u65e5\u9077\u5165\\n  \u8a72\u5c4b\u5c45\u4f4f\uff0c\u9042\u8207\u620a\u25cb\u25cb\u76f8\u7d04\u5546\u8ac7\u620a\u25cb\u25cb\u5bb6\u4eba\u642c\u9077\u4e8b\u5b9c\u3002\u620a\u25cb\u25cb\u5055\u540c\u5176\u5144\u5f1f\u8b1d\u5148\u77e5\u3001\\n  \u8b1d\u5148\u82f1\u65bc\u540c\u5e74\u5341\u6708\u5341\u4e09\u65e5\u5341\u516b\u6642\u4e09\u5341\u5206\u8a31\u81f3\u53f0\u5317\u7e23\u6c50\u6b62\u5e02\u25cb\u25cb\u8def\u5341\u4e8c\u865f\u300c\u4e94\u6307\u5c71\u571f\\n  \u96de\u57ce\u300d\uff0c\u8207\u4e19\u25cb\u25cb\u3001\u4e01\u25cb\u25cb\u3001\u4e19\u25cb\u25cb\u53cb\u4eba\u4e59\u25cb\u25cb\u53ca\u9673\u59d3\u4ee3\u66f8\u9910\u6558\u8a0e\u8ad6\u4ea4\u5c4b\u4e8b\u5b9c\uff0c\u81f3\\n  \u4e8c\u5341\u4e00\u6642\u4e8c\u5341\u5206\u8a31\uff0c\u8b1d\u5148\u77e5\u3001\u8b1d\u5148\u82f1\u53ca\u9673\u59d3\u4ee3\u66f8\u76f8\u7e7c\u96e2\u958b\uff0c\u9918\u620a\u25cb\u25cb\u3001\u4e19\u25cb\u25cb\u3001\u4e01\\n  \u25cb\u25cb\u53ca\u4e59\u25cb\u25cb\u7e8c\u70ba\u5546\u8ac7\uff0c\u8a4e\u620a\u25cb\u25cb\u5148\u7a31\u539f\u5c4b\u4e3b\u7a4d\u6b20\u5176\u50b5\u52d9\uff0c\u6b21\u5c0d\u4e19\u25cb\u25cb\u7b49\u4eba\u6050\u5687\u7a31\\n  \uff1a\u300c\u4f60\u642c\u9032\u53bb\u5f97\u6a19\u7684\u623f\u5b50\u6703\u6b7b\u4eba\uff0c\u6211\u8981\u653e\u5b9a\u6642\u70b8\u5f48\u5728\u88e1\u9762\u300d\u7b49\u8a9e\u3002\u4e19\u25cb\u25cb\u70ba\u671f\u620a\u25cb\\n  \u25cb\u5118\u901f\u642c\u9077\uff0c\u9042\u62ff\u51fa\u73fe\u91d1\u4e94\u842c\u5143\u7a31\u4fc2\u642c\u9077\u8cbb\u4e26\u4ea4\u81f3\u620a\u25cb\u25cb\u8655\uff0c\u620a\u25cb\u25cb\u61a4\u800c\u4e1f\u56de\u4e19\u25cb\\n  \u25cb\u8655\u7a31\uff1a\u300c\u9019\u662f\u4e94\u842c\u7f8e\u91d1\u55ce\uff1f\u300d\uff0c\u4e59\u25cb\u25cb\u898b\u72c0\uff0c\u8a8d\u4e8b\u4e0d\u95dc\u5df2\uff0c\u9042\u81f3\u4ed6\u684c\u8207\u4e94\u6307\u5c71\u571f\\n  \u96de\u57ce\u4e4b\u8001\u95c6\u7532\u25cb\u25cb\u804a\u5929\uff0c\u620a\u25cb\u25cb\u8207\u4e19\u25cb\u25cb\u65bc\u4e59\u25cb\u25cb\u96e2\u958b\u5f8c\uff0c\u4ecd\u7e8c\u751f\u53e3\u89d2\u722d\u57f7\uff0c\u4e01\u25cb\\n  \u25cb\u898b\u5834\u9762\u7dca\u5f35\u9042\u81f3\u6ac3\u81fa\u64a5\u6253\u96fb\u8a71\u6b32\u592e\u4e19\u25cb\u25cb\u3001\u620a\u25cb\u25cb\u5747\u8a8d\u8b58\u4e4b\u53cb\u4eba\u524d\u4f86\u6392\u89e3\uff0c\u620a\u25cb\\n  \u25cb\u8207\u4e19\u25cb\u25cb\u65bc\u4e01\u25cb\u25cb\u96e2\u958b\u5f8c\uff0c\u4ecd\u7e8c\u751f\u722d\u57f7\uff0c\u4e19\u25cb\u25cb\u601d\u53ca\u620a\u25cb\u25cb\u5f37\u4f54\u4e01\u25cb\u25cb\u5f97\u6a19\u4e4b\u6cd5\\n  \u62cd\u5c4b\uff0c\u4e14\u53c8\u51fa\u8a00\u6050\u5687\uff0c\u6c23\u61a4\u96e3\u5e73\uff0c\u5176\u53ef\u9810\u898b\u7528\u529b\u5c07\u9910\u684c\u4e0a\u4e4b\u9152\u74f6\u3001\u676f\u76e4\u63a8\u5411\u620a\u25cb\u25cb\\n  \u8655\uff0c\u9152\u74f6\u3001\u676f\u76e4\u53ef\u80fd\u7834\u788e\uff0c\u620a\u25cb\u25cb\u5c07\u906d\u7834\u788e\u4e4b\u9152\u74f6\u3001\u676f\u76e4\u523a\u50b7\uff0c\u7adf\u4ecd\u65bc\u4e8c\u5341\u4e00\u6642\u4e09\\n  \u5341\u5206\u8a31\u57fa\u65bc\u666e\u901a\u50b7\u5bb3\u4e4b\u6545\u610f\u7528\u529b\u5c07\u9910\u684c\u4e0a\u4e4b\u9152\u74f6\u3001\u676f\u76e4\u63a8\u5411\u620a\u25cb\u25cb\uff0c\u81f4\u4f7f\u7834\u788e\u4e4b\u9152\\n  \u74f6\u5272\u50b7\u620a\u25cb\u25cb\u4e4b\u53f3\u4e0a\u81c2\uff0c\u620a\u25cb\u25cb\u906d\u6b64\u50b7\u5bb3\uff0c\u4ea6\u8d77\u666e\u901a\u50b7\u5bb3\u4e4b\u6545\u610f\uff0c\u6bc6\u6253\u4e19\u25cb\u25cb\uff0c\u4e19\\n  \u25cb\u25cb\u5373\u627f\u524d\u958b\u50b7\u5bb3\u4e4b\u63a5\u7e8c\u72af\u610f\u5f92\u624b\u8207\u620a\u25cb\u25cb\u4e92\u76f8\u62c9\u626f\u53ca\u6bc6\u6253\uff0c\u4e8c\u4eba\u4e26\u5012\u5728\u5730\u4e0a\u4e92\u76f8\\n  \u62c9\u626f\u3001\u626d\u6253\uff0c\u620a\u25cb\u25cb\u4e4b\u982d\u90e8\u56e0\u800c\u649e\u64ca\u91cd\u7269\uff0c\u7d93\u805e\u8072\u76f8\u7e7c\u524d\u4f86\u4e4b\u4e59\u25cb\u25cb\u3001\u7532\u25cb\u25cb\u52f8\u963b\\n  \u3001\u62c9\u958b\uff0c\u4e8c\u4eba\u59cb\u7f77\u624b\uff0c\u620a\u25cb\u25cb\u56e0\u800c\u53d7\u6709\u53f3\u4e0a\u81c2\u4e8c\u8655\u5404\u7d04\u4e09\u516c\u5206\u53ca\u516d\u516c\u5206\u4e4b\u6495\u88c2\u50b7\u3001\\n  \u982d\u90e8\u920d\u5668\u649e\u64ca\u50b7\u3001\u5169\u624b\u92bc\u50b7\uff08\u8072\u8acb\u7c21\u6613\u5224\u6c7a\u8655\u5211\u66f8\u8aa4\u70ba\u920d\u50b7\uff0c\u61c9\u4e88\u66f4\u6b63\uff09\u53ca\u7600\u50b7\u4e4b\\n  \u666e\u901a\u50b7\u5bb3\u3002\\n\u4e8c\u6848\u7d93\u88ab\u5bb3\u4eba\u620a\u25cb\u25cb\u8a34\u7531\u53f0\u5317\u7e23\u653f\u5e9c\u8b66\u5bdf\u5c40\u6c50\u6b62\u5206\u5c40\u5831\u544a\u53f0\u7063\u58eb\u6797\u5730\u65b9\u6cd5\u9662\u6aa2\u5bdf\u7f72\u6aa2\\n  \u5bdf\u5b98\u5075\u67e5\u8d77\u8a34\u3002\\n    \u7406  \u7531\\n\u4e00\u53f3\u63ed\u72af\u7f6a\u4e8b\u5be6\uff0c\u696d\u64da\u88ab\u544a\u4e19\u25cb\u25cb\u65bc\u5075\u67e5\u3001\u672c\u9662\u8abf\u67e5\u3001\u5be9\u7406\u81ea\u767d\u4e0d\u8af1\uff0c\u53ca\u65bc\u672c\u9662\u5be9\u7406\\n  \u620a\u25cb\u25cb\u72af\u6050\u5687\u3001\u50b7\u5bb3\u6848\u4ef6\u4f5c\u8b49\u6642\u9673\u8ff0\u5728\u5377\uff08\u53c3\u672c\u9662\u4e5d\u5341\u4e09\u5e74\u5341\u4e00\u6708\u5341\u65e5\u5341\u56db\u6642\u4e4b\u5be9\\n  \u7406\u7b46\u9304\u7b2c\u5341\u4e5d\u9801\uff09\uff0c\u5fa9\u64da\u8b49\u4eba\u620a\u25cb\u25cb\u3001\u4e01\u25cb\u25cb\u3001\u4e59\u25cb\u25cb\u3001\u7532\u25cb\u25cb\u8b49\u8ff0\u7da6\u8a73\uff0c\u4e14\u6709\u8ca1\\n  \u5718\u6cd5\u4eba\u570b\u6cf0\u7d9c\u5408\u91ab\u9662\u5167\u6e56\u5206\u9662\u958b\u7acb\u4e88\u544a\u8a34\u4eba\u620a\u25cb\u25cb\u4e4b\u8a3a\u65b7\u8b49\u660e\u66f8\u5728\u5377\u53ef\u53c3\u3002\u800c\u88ab\u544a\\n  \u4e19\u25cb\u25cb\u4e4b\u59bb\u4e01\u25cb\u25cb\u59d4\u4efb\u4ee3\u7406\u4eba\u694a\u7f8e\u96f2\uff0c\u53c3\u52a0\u672c\u9662\u4e5d\u5341\u5e74\u5ea6\u57f7\u5b57\u7b2c\u4e00\u4e09\uff10\u4e94\u4e00\u865f\u5f37\u5236\\n  \u57f7\u884c\u6848\u4ef6\u524d\u958b\u623f\u5730\u7af6\u6a19\uff0c\u4e01\u25cb\u25cb\u5f97\u6a19\uff0c\u4e26\u53d6\u5f97\u672c\u9662\u6838\u767c\u4e4b\u6b0a\u5229\u79fb\u8f49\u8b49\u66f8\uff0c\u800c\u70ba\u4e0a\u958b\\n  \u623f\u5730\u4e4b\u6240\u6709\u6b0a\u4eba\u3002\u56e0\u620a\u25cb\u25cb\u5bb6\u4eba\u5c45\u4f4f\u5728\u4e01\u25cb\u25cb\u6a19\u5f97\u4e4b\u524d\u958b\u623f\u5730\u5167\uff0c\u4e19\u25cb\u25cb\u70ba\u80fd\u65e9\u65e5\\n  \u9077\u5165\u8a72\u5c4b\u5c45\u4f4f\uff0c\u9042\u8207\u620a\u25cb\u25cb\u76f8\u7d04\u5546\u8ac7\u620a\u25cb\u25cb\u5bb6\u4eba\u642c\u9077\u4e8b\u5b9c\u3002\u620a\u25cb\u25cb\u5055\u540c\u5176\u5144\u5f1f\u8b1d\u5148\\n  \u77e5\u3001\u8b1d\u5148\u82f1\u65bc\u4e5d\u5341\u4e8c\u5e74\u5341\u6708\u5341\u4e09\u65e5\u5341\u516b\u6642\u4e09\u5341\u5206\u8a31\u81f3\u53f0\u5317\u7e23\u6c50\u6b62\u5e02\u25cb\u25cb\u8def\u5341\u4e8c\u865f\u300c\\n  \u4e94\u6307\u5c71\u571f\u96de\u57ce\u300d\uff0c\u8207\u4e19\u25cb\u25cb\u3001\u4e01\u25cb\u25cb\u3001\u4e59\u25cb\u25cb\u53ca\u9673\u59d3\u4ee3\u66f8\u9910\u6558\u8a0e\u8ad6\u4ea4\u5c4b\u4e8b\u5b9c\uff0c\u81f3\u4e8c\\n  \u5341\u4e00\u6642\u4e8c\u5341\u5206\u8a31\u8b1d\u5148\u77e5\u3001\u8b1d\u5148\u82f1\u53ca\u9673\u59d3\u4ee3\u66f8\u76f8\u7e7c\u96e2\u958b\u7b49\u60c5\uff0c\u5df2\u64da\u8b49\u4eba\u4e01\u25cb\u25cb\u3001\u4e59\u25cb\\n  \u25cb\u3001\u7532\u25cb\u25cb\u3001\u620a\u25cb\u25cb\u8b49\u8ff0\u5728\u5377\uff0c\u4e26\u7d93\u672c\u9662\u8abf\u53d6\u672c\u9662\u4e5d\u5341\u5e74\u5ea6\u57f7\u5b57\u7b2c\u4e00\u4e09\uff10\u4e94\u4e00\u865f\u57f7\\n  \u884c\u5377\u6838\u95b1\u7121\u8aa4\uff0c\u5fa9\u6709\u6295\u6a19\u66f8\u3001\u5f37\u5236\u57f7\u884c\u6848\u6b3e\u6536\u64da\u3001\u672c\u9662\u6b0a\u5229\u79fb\u8f49\u8b49\u66f8\u7b49\u5f71\u672c\u5728\u5377\u53ef\\n  \u53c3\u3002\u518d\u67e5\u544a\u8a34\u4eba\u620a\u25cb\u25cb\u96d6\u6307\u7a31\uff1a\u88ab\u544a\u4e19\u25cb\u25cb\u6572\u788e\u9152\u74f6\u518d\u6301\u7834\u788e\u4e4b\u9152\u74f6\u523a\u50b7\u4f0a\u4e91\u4e91\uff0c\\n  \u7136\u70ba\u88ab\u544a\u4e19\u25cb\u25cb\u5805\u8a5e\u5426\u8a8d\uff0c\u8a0a\u64da\u5728\u5834\u4e4b\u8b49\u4eba\u4e01\u25cb\u25cb\u3001\u4e59\u25cb\u25cb\u3001\u7532\u25cb\u25cb\u7b49\u4eba\u4ea6\u5747\u8b49\u7a31\\n  \uff1a\u672a\u898b\u88ab\u544a\u4e19\u25cb\u25cb\u6301\u7834\u788e\u4e4b\u9152\u74f6\u523a\u544a\u8a34\u4eba\u620a\u25cb\u25cb\u7b49\u8a9e\uff0c\u518d\u67e5\u5728\u88ab\u544a\u4e19\u25cb\u25cb\u8207\u620a\u25cb\u25cb\\n  \u8d77\u885d\u7a81\u524d\uff0c\u4e8c\u4eba\u5750\u5728\u5713\u684c\u7528\u9910\uff0c\u88ab\u544a\u4e19\u25cb\u25cb\u5750\u5728\u544a\u8a34\u4eba\u620a\u25cb\u25cb\u5c0d\u9762\u7b49\u60c5\uff0c\u5df2\u64da\u544a\u8a34\\n  \u4eba\u620a\u25cb\u25cb\u9673\u660e\uff0c\u5018\u88ab\u544a\u4e19\u25cb\u25cb\u78ba\u6709\u6572\u7834\u9152\u74f6\uff0c\u81ea\u88ab\u544a\u620a\u25cb\u25cb\u5c0d\u9762\u885d\u904e\u4f86\u8981\u523a\u88ab\u544a\u620a\\n  \u25cb\u25cb\u4e4b\u8209\uff0c\u8861\u60c5\u88ab\u544a\u620a\u25cb\u25cb\u61c9\u6709\u7de9\u885d\u4e4b\u6642\u9593\u9003\u907f\u6216\u547c\u6551\uff0c\u7109\u6709\u53ef\u80fd\u975c\u5750\u8a72\u8655\u906d\u88ab\u544a\\n  \u4e19\u25cb\u25cb\u4ee5\u7834\u788e\u9152\u74f6\u523a\u50b7\u4e4b\u7406\uff1f\u518d\u67e5\u544a\u8a34\u4eba\u620a\u25cb\u25cb\u56e0\u88ab\u544a\u4e19\u25cb\u25cb\u4e4b\u50b7\u5bb3\u53d7\u6709\u53f3\u4e0a\u81c2\u4e8c\\n  \u8655\u5404\u7d04\u4e09\u516c\u5206\u53ca\u516d\u516c\u5206\u4e4b\u6495\u88c2\u50b7\u4e4b\u50b7\u5bb3\uff0c\u6b64\u6495\u88c2\u50b7\u986f\u975e\u5f92\u624b\u6240\u81f4\uff0c\u662f\u8a72\u50b7\u61c9\u4fc2\u88ab\u544a\\n  \u4e19\u25cb\u25cb\u5c07\u9910\u684c\u4e0a\u4e4b\u9152\u74f6\u3001\u676f\u76e4\u63a8\u5411\u620a\u25cb\u25cb\u8655\u6642\uff0c\u620a\u25cb\u25cb\u906d\u7834\u788e\u4e4b\u9152\u74f6\u523a\u50b7\u6240\u81f4\uff0c\u544a\\n  \u8a34\u4eba\u620a\u25cb\u25cb\u7a31\uff1a\u4fc2\u88ab\u544a\u4e19\u25cb\u25cb\u6572\u788e\u9152\u74f6\u5f8c\uff0c\u6301\u7834\u788e\u4e4b\u9152\u74f6\u885d\u904e\u4f86\u523a\u50b7\u4f0a\u4e91\u4e91\u986f\u70ba\u8a87\\n  \u5927\u4e4b\u8a5e\uff0c\u4e0d\u8db3\u63a1\u4fe1\uff0c\u81f3\u88ab\u544a\u620a\u25cb\u25cb\u6240\u53d7\u4e4b\u982d\u90e8\u920d\u5668\u649e\u64ca\u50b7\uff0c\u5247\u61c9\u4fc2\u4e8c\u4eba\u4e92\u6bc6\u3001\u62c9\u626f\\n  \uff0c\u5012\u843d\u5728\u5730\u4e0a\u4e92\u76f8\u62c9\u626f\u3001\u626d\u6253\uff0c\u544a\u8a34\u4eba\u620a\u25cb\u25cb\u4e4b\u982d\u90e8\u56e0\u800c\u649e\u64ca\u91cd\u7269\u6240\u81f4\u3002\u516c\u8a34\u4eba\u6f0f\\n  \u672a\u659f\u914c\u88ab\u544a\u4e19\u25cb\u25cb\u6383\u843d\u9910\u684c\u4e0a\u4e4b\u9152\u74f6\u3001\u7897\u76e4\uff0c\u81f4\u7834\u788e\u4e4b\u9152\u74f6\u5272\u50b7\u544a\u8a34\u4eba\u620a\u25cb\u25cb\u90e8\u5206\\n  \uff0c\u5c1a\u6709\u672a\u6d3d\uff0c\u61c9\u4e88\u88dc\u5145\u3002\u7d9c\u4e0a\u6240\u8ff0\uff0c\u582a\u8a8d\u88ab\u544a\u4e19\u25cb\u25cb\u4e4b\u81ea\u767d\u8207\u4e8b\u5be6\u76f8\u7b26\uff0c\u8db3\u4ee5\u63a1\u4fe1\\n  \u3002\u672c\u4ef6\u4e8b\u8b49\u660e\u78ba\uff0c\u88ab\u544a\u72af\u884c\u6d35\u582a\u8a8d\u5b9a\uff0c\u61c9\u4f9d\u6cd5\u8ad6\u79d1\u3002\\n\u4e8c\u6838\u88ab\u544a\u4e19\u25cb\u25cb\u6240\u70ba\uff0c\u4fc2\u72af\u5211\u6cd5\u7b2c\u4e8c\u767e\u4e03\u5341\u4e03\u689d\u7b2c\u4e00\u9805\u4e4b\u50b7\u5bb3\u7f6a\uff0c\u5176\u591a\u6b21\u6bc6\u64ca\u88ab\u544a\u620a\\n  \u25cb\u25cb\u4e4b\u72af\u884c\uff0c\u6642\u9593\u5bc6\u63a5\u3001\u5834\u6240\u540c\u4e00\uff0c\u986f\u4fc2\u57fa\u65bc\u4e00\u63a5\u7e8c\u4e4b\u72af\u610f\u70ba\u4e4b\uff0c\u61c9\u8ad6\u4ee5\u4e00\u7f6a\u3002\u7230\\n  \u5be9\u914c\u88ab\u544a\u4e19\u25cb\u25cb\u72af\u7f6a\u4e4b\u52d5\u6a5f\u3001\u624b\u6bb5\u3001\u544a\u8a34\u4eba\u620a\u25cb\u25cb\u6240\u53d7\u4e4b\u640d\u5bb3\u3001\u72af\u5f8c\u5766\u8a8d\u72af\u884c\uff0c\u4e26\\n  \u8868\u793a\u6b32\u8207\u544a\u8a34\u4eba\u620a\u25cb\u25cb\u548c\u89e3\uff0c\u60df\u56e0\u88ab\u544a\u620a\u25cb\u25cb\u62d2\u7d55\uff0c\u800c\u7121\u6cd5\u5354\u5546\u7b49\u4e00\u5207\u60c5\u4e8b\uff0c\u91cf\u8655\\n  \u5982\u4e3b\u6587\u6240\u793a\u4e4b\u5211\uff0c\u4e26\u8aed\u77e5\u6613\u79d1\u7f70\u91d1\u4e4b\u6298\u7b97\u6a19\u6e96\u3002\\n\u64da\u4e0a\u8ad6\u65b7\uff0c\u61c9\u4f9d\u5211\u4e8b\u8a34\u8a1f\u6cd5\u7b2c\u56db\u767e\u4e94\u5341\u4e8c\u689d\u3001\u7b2c\u4e8c\u767e\u4e5d\u5341\u4e5d\u689d\u7b2c\u4e00\u9805\u524d\u6bb5\u3001\u7b2c\u4e8c\u767e\u4e03\\n\u5341\u4e09\u689d\u4e4b\u4e00\u7b2c\u4e00\u9805\u3001\u5211\u6cd5\u7b2c\u4e8c\u767e\u4e03\u5341\u4e03\u689d\u7b2c\u4e00\u9805\u3001\u7b2c\u56db\u5341\u4e00\u689d\u7b2c\u4e00\u9805\uff0c\u7f70\u91d1\u7f70\u9370\u63d0\u9ad8\\n\u6a19\u6e96\u689d\u4f8b\u7b2c\u4e00\u689d\u524d\u6bb5\u3001\u7b2c\u4e8c\u689d\uff0c\u5224\u6c7a\u5982\u4e3b\u6587\u3002\\n\u672c\u6848\u7d93\u6aa2\u5bdf\u5b98\u9ad8\u4fca\u7533\u5230\u5ead\u57f7\u884c\u8077\u52d9\\n\u4e2d      \u83ef      \u6c11      \u570b    \u4e5d\u5341\u4e09    \u5e74    \u5341\u4e00    \u6708     \u4e8c\u5341\u56db     \u65e5\\n                    \u81fa\u7063\u58eb\u6797\u5730\u65b9\u6cd5\u9662\u5211\u4e8b\u7b2c\u4e00\u5ead\\n                                  \u6cd5  \u5b98  \u6c5f  \u7fe0  \u840d\\n\u53f3\u6b63\u672c\u8b49\u660e\u8207\u539f\u672c\u7121\u7570\u3002\\n\u5982\u4e0d\u670d\u672c\u5224\u6c7a\uff0c\u61c9\u65bc\u5224\u6c7a\u9001\u9054\u5f8c\u5341\u65e5\u5167\uff0c\u5411\u672c\u9662\u63d0\u51fa\u4e0a\u8a34\u72c0\u3002\\n                                  \u66f8\u8a18\u5b98  \u8303  \u6dd1  \u82ac\\n\u4e2d      \u83ef      \u6c11      \u570b    \u4e5d\u5341\u4e09    \u5e74    \u5341\u4e00    \u6708     \u4e8c\u5341\u4e5d     \u65e5\\n\u8ad6\u7f6a\u689d\u6587\uff0c\u5211\u6cd5\u7b2c\u4e8c\u767e\u4e03\u5341\u4e03\u689d\u7b2c\u4e00\u9805\uff1a\\n\u5211\u6cd5\u7b2c\u4e8c\u767e\u4e03\u5341\u4e03\u689d\uff1a(\u666e\u901a\u50b7\u5bb3\u7f6a)\\n\u50b7\u5bb3\u4eba\u4e4b\u8eab\u9ad4\u6216\u5065\u5eb7\u8005\uff0c\u8655\u4e09\u5e74\u4ee5\u4e0b\u6709\u671f\u5f92\u5211\u3001\u62d8\u5f79\u6216\u4e00\u5343\u5143\u4ee5\u4e0b\u7f70\u91d1\u3002\\n\",\n  \"structure\": {\n    \"main\": \"\u4e19\u25cb\u25cb\u50b7\u5bb3\u4eba\u4e4b\u8eab\u9ad4\uff0c\u8655\u62d8\u5f79\u4f0d\u62fe\u7396\u65e5\uff0c\u5982\u6613\u79d1\u7f70\u91d1\u4ee5\ue372\u4f70\u5143\u6298\u7b97\u58f9\u65e5\u3002\",\n    \"fact\": \"\u4e00\u7de3\u4e19\u25cb\u25cb\u4e4b\u59bb\u4e01\u25cb\u25cb\u59d4\u4efb\u4ee3\u7406\u4eba\u694a\u7f8e\u96f2\uff0c\u65bc\u6c11\u570b\u4e5d\u5341\u4e8c\u5e74\u4e5d\u6708\u5341\u516b\u65e5\u53c3\u52a0\u672c\u9662\u4e5d\u5341\\n  \u5e74\u5ea6\u57f7\u5b57\u7b2c\u4e00\u4e09\uff10\u4e94\u4e00\u865f\uff0c\u50b5\u6b0a\u4eba\u7b2c\u4e00\u5546\u696d\u9280\u884c\u80a1\u4efd\u6709\u9650\u516c\u53f8\u8072\u8acb\u62cd\u8ce3\u50b5\u52d9\u4eba\u53e4\u5149\\n  \u5b87\u6240\u6709\u9580\u724c\u865f\u78bc\u53f0\u5317\u7e23\u6c50\u6b62\u5e02\u25cb\u25cb\u8def\u4e8c\u4e00\u56db\u5df7\u5341\u4e8c\u865f\u4e00\u81f3\u56db\u6a13\u5efa\u7269\uff0c\u53ca\u8a72\u5efa\u7269\u5ea7\u843d\\n  \u4e4b\u53f0\u5317\u7e23\u6c50\u6b62\u5e02\u25cb\u25cb\u25cb\u6bb5\u8eca\u576a\u5bee\u5c0f\u6bb5\u4e00\u516d\u516d\u2500\u4e09\u516d\u4e8c\u5730\u865f\u571f\u5730\u5f37\u5236\u57f7\u884c\u6848\u4ef6\u4e4b\u7af6\u6a19\\n  \uff0c\u4e01\u25cb\u25cb\u4ee5\u65b0\u53f0\u5e63\uff08\u4e0b\u540c\uff09\u4e03\u767e\u4e94\u5341\u516b\u842c\u516b\u5343\u5143\u5f97\u6a19\uff0c\u4e26\u65bc\u540c\u5e74\u6708\u4e8c\u5341\u56db\u65e5\u7e73\u7d0d\u50f9\\n  \u6b3e\uff0c\u65cb\u7d93\u672c\u9662\u767c\u4e88\u6b0a\u5229\u79fb\u8f49\u8b49\u66f8\uff0c\u800c\u70ba\u4e0a\u958b\u623f\u5730\u4e4b\u6240\u6709\u6b0a\u4eba\u3002\u56e0\u620a\u25cb\u25cb\uff08\u6240\u6d89\u6050\u5687\\n  \u3001\u50b7\u5bb3\u72af\u884c\u53e6\u884c\u5be9\u7d50\uff09\u5bb6\u4eba\u5c45\u4f4f\u5728\u4e01\u25cb\u25cb\u6a19\u5f97\u4e4b\u524d\u958b\u623f\u5730\u5167\uff0c\u4e19\u25cb\u25cb\u70ba\u80fd\u65e9\u65e5\u9077\u5165\\n  \u8a72\u5c4b\u5c45\u4f4f\uff0c\u9042\u8207\u620a\u25cb\u25cb\u76f8\u7d04\u5546\u8ac7\u620a\u25cb\u25cb\u5bb6\u4eba\u642c\u9077\u4e8b\u5b9c\u3002\u620a\u25cb\u25cb\u5055\u540c\u5176\u5144\u5f1f\u8b1d\u5148\u77e5\u3001\\n  \u8b1d\u5148\u82f1\u65bc\u540c\u5e74\u5341\u6708\u5341\u4e09\u65e5\u5341\u516b\u6642\u4e09\u5341\u5206\u8a31\u81f3\u53f0\u5317\u7e23\u6c50\u6b62\u5e02\u25cb\u25cb\u8def\u5341\u4e8c\u865f\u300c\u4e94\u6307\u5c71\u571f\\n  \u96de\u57ce\u300d\uff0c\u8207\u4e19\u25cb\u25cb\u3001\u4e01\u25cb\u25cb\u3001\u4e19\u25cb\u25cb\u53cb\u4eba\u4e59\u25cb\u25cb\u53ca\u9673\u59d3\u4ee3\u66f8\u9910\u6558\u8a0e\u8ad6\u4ea4\u5c4b\u4e8b\u5b9c\uff0c\u81f3\\n  \u4e8c\u5341\u4e00\u6642\u4e8c\u5341\u5206\u8a31\uff0c\u8b1d\u5148\u77e5\u3001\u8b1d\u5148\u82f1\u53ca\u9673\u59d3\u4ee3\u66f8\u76f8\u7e7c\u96e2\u958b\uff0c\u9918\u620a\u25cb\u25cb\u3001\u4e19\u25cb\u25cb\u3001\u4e01\\n  \u25cb\u25cb\u53ca\u4e59\u25cb\u25cb\u7e8c\u70ba\u5546\u8ac7\uff0c\u8a4e\u620a\u25cb\u25cb\u5148\u7a31\u539f\u5c4b\u4e3b\u7a4d\u6b20\u5176\u50b5\u52d9\uff0c\u6b21\u5c0d\u4e19\u25cb\u25cb\u7b49\u4eba\u6050\u5687\u7a31\\n  \uff1a\u300c\u4f60\u642c\u9032\u53bb\u5f97\u6a19\u7684\u623f\u5b50\u6703\u6b7b\u4eba\uff0c\u6211\u8981\u653e\u5b9a\u6642\u70b8\u5f48\u5728\u88e1\u9762\u300d\u7b49\u8a9e\u3002\u4e19\u25cb\u25cb\u70ba\u671f\u620a\u25cb\\n  \u25cb\u5118\u901f\u642c\u9077\uff0c\u9042\u62ff\u51fa\u73fe\u91d1\u4e94\u842c\u5143\u7a31\u4fc2\u642c\u9077\u8cbb\u4e26\u4ea4\u81f3\u620a\u25cb\u25cb\u8655\uff0c\u620a\u25cb\u25cb\u61a4\u800c\u4e1f\u56de\u4e19\u25cb\\n  \u25cb\u8655\u7a31\uff1a\u300c\u9019\u662f\u4e94\u842c\u7f8e\u91d1\u55ce\uff1f\u300d\uff0c\u4e59\u25cb\u25cb\u898b\u72c0\uff0c\u8a8d\u4e8b\u4e0d\u95dc\u5df2\uff0c\u9042\u81f3\u4ed6\u684c\u8207\u4e94\u6307\u5c71\u571f\\n  \u96de\u57ce\u4e4b\u8001\u95c6\u7532\u25cb\u25cb\u804a\u5929\uff0c\u620a\u25cb\u25cb\u8207\u4e19\u25cb\u25cb\u65bc\u4e59\u25cb\u25cb\u96e2\u958b\u5f8c\uff0c\u4ecd\u7e8c\u751f\u53e3\u89d2\u722d\u57f7\uff0c\u4e01\u25cb\\n  \u25cb\u898b\u5834\u9762\u7dca\u5f35\u9042\u81f3\u6ac3\u81fa\u64a5\u6253\u96fb\u8a71\u6b32\u592e\u4e19\u25cb\u25cb\u3001\u620a\u25cb\u25cb\u5747\u8a8d\u8b58\u4e4b\u53cb\u4eba\u524d\u4f86\u6392\u89e3\uff0c\u620a\u25cb\\n  \u25cb\u8207\u4e19\u25cb\u25cb\u65bc\u4e01\u25cb\u25cb\u96e2\u958b\u5f8c\uff0c\u4ecd\u7e8c\u751f\u722d\u57f7\uff0c\u4e19\u25cb\u25cb\u601d\u53ca\u620a\u25cb\u25cb\u5f37\u4f54\u4e01\u25cb\u25cb\u5f97\u6a19\u4e4b\u6cd5\\n  \u62cd\u5c4b\uff0c\u4e14\u53c8\u51fa\u8a00\u6050\u5687\uff0c\u6c23\u61a4\u96e3\u5e73\uff0c\u5176\u53ef\u9810\u898b\u7528\u529b\u5c07\u9910\u684c\u4e0a\u4e4b\u9152\u74f6\u3001\u676f\u76e4\u63a8\u5411\u620a\u25cb\u25cb\\n  \u8655\uff0c\u9152\u74f6\u3001\u676f\u76e4\u53ef\u80fd\u7834\u788e\uff0c\u620a\u25cb\u25cb\u5c07\u906d\u7834\u788e\u4e4b\u9152\u74f6\u3001\u676f\u76e4\u523a\u50b7\uff0c\u7adf\u4ecd\u65bc\u4e8c\u5341\u4e00\u6642\u4e09\\n  \u5341\u5206\u8a31\u57fa\u65bc\u666e\u901a\u50b7\u5bb3\u4e4b\u6545\u610f\u7528\u529b\u5c07\u9910\u684c\u4e0a\u4e4b\u9152\u74f6\u3001\u676f\u76e4\u63a8\u5411\u620a\u25cb\u25cb\uff0c\u81f4\u4f7f\u7834\u788e\u4e4b\u9152\\n  \u74f6\u5272\u50b7\u620a\u25cb\u25cb\u4e4b\u53f3\u4e0a\u81c2\uff0c\u620a\u25cb\u25cb\u906d\u6b64\u50b7\u5bb3\uff0c\u4ea6\u8d77\u666e\u901a\u50b7\u5bb3\u4e4b\u6545\u610f\uff0c\u6bc6\u6253\u4e19\u25cb\u25cb\uff0c\u4e19\\n  \u25cb\u25cb\u5373\u627f\u524d\u958b\u50b7\u5bb3\u4e4b\u63a5\u7e8c\u72af\u610f\u5f92\u624b\u8207\u620a\u25cb\u25cb\u4e92\u76f8\u62c9\u626f\u53ca\u6bc6\u6253\uff0c\u4e8c\u4eba\u4e26\u5012\u5728\u5730\u4e0a\u4e92\u76f8\\n  \u62c9\u626f\u3001\u626d\u6253\uff0c\u620a\u25cb\u25cb\u4e4b\u982d\u90e8\u56e0\u800c\u649e\u64ca\u91cd\u7269\uff0c\u7d93\u805e\u8072\u76f8\u7e7c\u524d\u4f86\u4e4b\u4e59\u25cb\u25cb\u3001\u7532\u25cb\u25cb\u52f8\u963b\\n  \u3001\u62c9\u958b\uff0c\u4e8c\u4eba\u59cb\u7f77\u624b\uff0c\u620a\u25cb\u25cb\u56e0\u800c\u53d7\u6709\u53f3\u4e0a\u81c2\u4e8c\u8655\u5404\u7d04\u4e09\u516c\u5206\u53ca\u516d\u516c\u5206\u4e4b\u6495\u88c2\u50b7\u3001\\n  \u982d\u90e8\u920d\u5668\u649e\u64ca\u50b7\u3001\u5169\u624b\u92bc\u50b7\uff08\u8072\u8acb\u7c21\u6613\u5224\u6c7a\u8655\u5211\u66f8\u8aa4\u70ba\u920d\u50b7\uff0c\u61c9\u4e88\u66f4\u6b63\uff09\u53ca\u7600\u50b7\u4e4b\\n  \u666e\u901a\u50b7\u5bb3\u3002\\n\u4e8c\u6848\u7d93\u88ab\u5bb3\u4eba\u620a\u25cb\u25cb\u8a34\u7531\u53f0\u5317\u7e23\u653f\u5e9c\u8b66\u5bdf\u5c40\u6c50\u6b62\u5206\u5c40\u5831\u544a\u53f0\u7063\u58eb\u6797\u5730\u65b9\u6cd5\u9662\u6aa2\u5bdf\u7f72\u6aa2\\n  \u5bdf\u5b98\u5075\u67e5\u8d77\u8a34\u3002\",\n    \"reason\": \"\u4e00\u53f3\u63ed\u72af\u7f6a\u4e8b\u5be6\uff0c\u696d\u64da\u88ab\u544a\u4e19\u25cb\u25cb\u65bc\u5075\u67e5\u3001\u672c\u9662\u8abf\u67e5\u3001\u5be9\u7406\u81ea\u767d\u4e0d\u8af1\uff0c\u53ca\u65bc\u672c\u9662\u5be9\u7406\\n  \u620a\u25cb\u25cb\u72af\u6050\u5687\u3001\u50b7\u5bb3\u6848\u4ef6\u4f5c\u8b49\u6642\u9673\u8ff0\u5728\u5377\uff08\u53c3\u672c\u9662\u4e5d\u5341\u4e09\u5e74\u5341\u4e00\u6708\u5341\u65e5\u5341\u56db\u6642\u4e4b\u5be9\\n  \u7406\u7b46\u9304\u7b2c\u5341\u4e5d\u9801\uff09\uff0c\u5fa9\u64da\u8b49\u4eba\u620a\u25cb\u25cb\u3001\u4e01\u25cb\u25cb\u3001\u4e59\u25cb\u25cb\u3001\u7532\u25cb\u25cb\u8b49\u8ff0\u7da6\u8a73\uff0c\u4e14\u6709\u8ca1\\n  \u5718\u6cd5\u4eba\u570b\u6cf0\u7d9c\u5408\u91ab\u9662\u5167\u6e56\u5206\u9662\u958b\u7acb\u4e88\u544a\u8a34\u4eba\u620a\u25cb\u25cb\u4e4b\u8a3a\u65b7\u8b49\u660e\u66f8\u5728\u5377\u53ef\u53c3\u3002\u800c\u88ab\u544a\\n  \u4e19\u25cb\u25cb\u4e4b\u59bb\u4e01\u25cb\u25cb\u59d4\u4efb\u4ee3\u7406\u4eba\u694a\u7f8e\u96f2\uff0c\u53c3\u52a0\u672c\u9662\u4e5d\u5341\u5e74\u5ea6\u57f7\u5b57\u7b2c\u4e00\u4e09\uff10 \uff0c\u4f9d\u884c\\n    \u70ba\u6642\u5168\u6c11\u5065\u5eb7\u4fdd\u96aa\u6cd5\u7b2c\u5341\u4e00\u689d\u7b2c\u4e09\u6b3e\u898f\u5b9a\u5df2\u8fa6\u7406\u9000\u4fdd\uff0c\u7136\u88ab\u544a\u537b\u65bc\u4e0a\u958b\u671f\u9593\uff0c\u4ee5\\n    \u5065\u4fdd\u8eab\u5206\u5c31\u8a3a\u8207\u4f4f\u9662\uff0c\u81f4\u539f\u544a\u652f\u51fa\u91ab\u7642\u8cbb\u7528\u5171\u8a08\u4e09\u842c\u56db\u5343\u516b\u767e\u516d\u5341\u4e8c\u5143\uff0c\u6263\u9664\u61c9\\n    \u9000\u9084\u88ab\u544a\u4e4b\u4fdd\u96aa\u8cbb\u91d1\u984d\u4e8c\u5343\u4e09\u767e\u516d\u5341\u5143\u5f8c\uff0c\u88ab\u544a\u61c9\u8fd4\u9084\u91ab\u7642\u8cbb\u7528\u8a08\u4e09\u842c\u4e8c\u5343\u4e94\u767e\\n    \u96f6\u4e8c\u5143\uff0c\u7230\u4f9d\u516c\u6cd5\u4e0a\u4e0d\u7576\u5f97\u5229\u6cd5\u5f8b\u95dc\u4fc2\u8acb\u6c42\u88ab\u544a\u8fd4\u9084\u4e0a\u958b\u91ab\u7642\u8cbb\u7528\u3002\\n\u4e8c\u3001\u6309\u300c\u6709\u4e0b\u5217\u60c5\u5f62\u4e4b\u4e00\u8005\uff0c\u975e\u5c6c\u672c\u4fdd\u96aa\u4fdd\u96aa\u5c0d\u8c61\uff0c\u5df2\u53c3\u52a0\u8005\uff0c\u61c9\u4e88\u9000\u4fdd\uff1a\uff0e\uff0e\uff0e\u4e09\\n    \u3001\u5931\u8e64\u6eff\u516d\u500b\u6708\u8005\u3002\u300d\u3001\u300c\u672c\u6cd5\u7b2c\u5341\u4e00\u689d\u6240\u7a31\u5931\u8e64\uff0c\u6307\u6236\u7c4d\u767b\u8a18\u7c3f\u8a3b\u8a18\u5931\u8e64\u6216\u884c\\n    \u65b9\u4e0d\u660e\u3002\u4fdd\u96aa\u5c0d\u8c61\u56e0\u906d\u9047\u707d\u96e3\u5931\u8e64\uff0c\u5f97\u81ea\u8a72\u707d\u96e3\u767c\u751f\u4e4b\u65e5\u9000\u4fdd\u3002\u300d\u884c\u70ba\u6642\u5168\u6c11\u5065\\n    \u5eb7\u4fdd\u96aa\u6cd5\u7b2c\u5341\u4e00\u689d\u7b2c\u4e09\u6b3e\u53ca\u540c\u6cd5\u65bd\u884c\u7d30\u5247\u7b2c\u4e09\u5341\u4e94\u689d\u5b9a\u6709\u660e\u6587\u3002\\n\u4e09\u3001\u7d93\u67e5\uff0c\u88ab\u544a\u5206\u5225\u65bc\u516b\u5341\u56db\u5e74\u5341\u6708\u4e09\u5341\u65e5\u8d77\u81f3\u516b\u5341\u516d\u5e74\u4e03\u6708\u4e8c\u5341\u56db\u65e5\u6b62\u3001\u516b\u5341\u516d\u5e74\\n    \u4e5d\u6708\u5341\u4e00\u65e5\u8d77\u81f3\u516b\u5341\u4e03\u5e74\u516b\u6708\u516d\u65e5\u6b62\u3001\u516b\u5341\u4e03\u5e74\u4e5d\u6708\u4e8c\u5341\u4e09\u65e5\u8d77\u81f3\u516b\u5341\u516b\u5e74\u4e03\u6708\\n    \u4e8c\u65e5\u6b62\u96e2\u5bb6\u51fa\u8d70\uff0c\u4e26\u65bc\u4e0a\u958b\u671f\u9593\uff0c\u4ee5\u5065\u4fdd\u8eab\u5206\u5c31\u8a3a\u8207\u4f4f\u9662\uff0c\u81f4\u539f\u544a\u652f\u51fa\u91ab\u7642\u8cbb\u7528\\n    \u5171\u8a08\u4e09\u842c\u56db\u5343\u516b\u767e\u516d\u5341\u4e8c\u5143\uff0c\u696d\u64da\u539f\u544a\u63d0\u51fa\u8b66\u653f\u7f72\u67e5\u5c0b\u4eba\u53e3\u4f5c\u696d\u500b\u5225\u67e5\u8a62\u5831\u8868\u3001\\n    \u91ab\u4e8b\u6a5f\u69cb\u8cbb\u7528\u7533\u5831\u8868\u3001\u539f\u544a\u6c42\u511f\u91d1\u984d\u8a08\u7b97\u8868\u7b49\u5f71\u672c\u9644\u5377\u53ef\u7a3d\uff0c\u88ab\u544a\u7d93\u9001\u9054\u8d77\u8a34\u72c0\\n    \u5f8c\uff0c\u672a\u63d0\u51fa\u4efb\u4f55\u7b54\u8faf\u4ee5\u4f9b\u672c\u9662\u659f\u914c\uff0c\u662f\u524d\u63ed\u4e8b\u5be6\uff0c\u582a\u4e88\u8a8d\u5b9a\u3002\u60df\u6240\u8b02\u5931\u8e64\u4f9d\u5168\u6c11\\n    \u5065\u5eb7\u4fdd\u96aa\u6cd5\u65bd\u884c\u7d30\u5247\u7b2c\u4e09\u5341\u4e94\u689d\u898f\u5b9a\uff0c\u4fc2\u6307\u6236\u7c4d\u767b\u8a18\u7c3f\u8a3b\u8a18\u5931\u8e64\u6216\u884c\u65b9\u4e0d\u660e\uff0c\u64da\\n    \u539f\u544a\u6240\u63d0\u4e4b\u88ab\u544a\u5168\u6236\u6236\u7c4d\u8cc7\u6599\uff0c\u4e26\u672a\u986f\u793a\u88ab\u544a\u66fe\u88ab\u8a3b\u8a18\u70ba\u5931\u8e64\u6216\u884c\u65b9\u4e0d\u660e\uff0c\u5247\u88ab\\n    \u544a\u4e0d\u7b26\u5408\u5168\u6c11\u5065\u5eb7\u4fdd\u96aa\u6cd5\u7b2c\u5341\u4e00\u689d\u7b2c\u4e09\u6b3e\u6240\u8b02\u5931\u8e64\u6eff\u516d\u500b\u6708\u4e4b\u898f\u5b9a\u751a\u660e\u3002\u53c8\u5168\u6c11\\n    \u5065\u4fdd\u5c6c\u65bc\u4e00\u7a2e\u793e\u6703\u4e92\u52a9\u3001\u5371\u96aa\u5206\u64d4\u4e4b\u793e\u6703\u4fdd\u96aa\u5236\u5ea6\uff0c\u4e26\u63a1\u53d6\u5f37\u5236\u4fdd\u96aa\u65b9\u5f0f\uff0c\u5982\u88ab\\n    \u544a\u50c5\u4fc2\u55ae\u7d14\u96e2\u5bb6\u51fa\u8d70\u903e\u516d\u500b\u6708\uff0c\u5373\u9808\u5f37\u5236\u9000\u4fdd\uff0c\u986f\u672a\u9054\u5230\u5168\u6c11\u5065\u4fdd\u4e4b\u7acb\u6cd5\u76ee\u7684\uff0c\\n    \u4e14\u6240\u8b02\u5931\u8e64\u4ea6\u9808\u5931\u8e64\u4eba\u96e2\u958b\u6700\u5f8c\u7684\u4f4f\u6240\u6216\u5c45\u6240\u800c\u751f\u6b7b\u4e0d\u660e\uff0c\u751f\u6b7b\u4e0d\u660e\u5247\u9808\u4f9d\u5e38\u7406\\n    \u5224\u65b7\uff0c\u5230\u5e95\u662f\u751f\u5b58\u6216\u6b7b\u4ea1\u7121\u6cd5\u65b7\u5b9a\uff0c\u59cb\u53ef\u7a31\u4e4b\u70ba\u5931\u8e64\uff08\u738b\u60e0\u5149\u3001\u9ec3\u78a7\u82ac\u3001\u99f1\u5fd7\u8c6a\\n    \u5408\u8457\u767d\u8a71\u516d\u6cd5\u7e3d\u5247\u50b5\u7bc7\u4e8c\uff10\uff10\u4e00\u5e74\u4e8c\u6708\u4e8c\u7248\u4e00\u5237\u7b2c\u4e8c\u56db\u9801\uff09\uff0c\u88ab\u544a\u4e4b\u55ae\u7d14\u6163\u6027\u96e2\\n    \u5bb6\uff0c\u61c9\u4e0d\u5305\u62ec\u5728\u5167\u3002\\n\u56db\u3001\u7d9c\u4e0a\u6240\u8ff0\uff0c\u88ab\u544a\u65e2\u4e0d\u7b26\u5408\u884c\u70ba\u6642\u5168\u6c11\u5065\u5eb7\u4fdd\u96aa\u6cd5\u7b2c\u5341\u4e00\u689d\u7b2c\u4e09\u6b3e\u9000\u4fdd\u4e4b\u898f\u5b9a\uff0c\u539f\\n    \u544a\u4f9d\u64da\u516c\u6cd5\u4e0a\u4e0d\u7576\u5f97\u5229\u4e4b\u6cd5\u5f8b\u95dc\u4fc2\uff0c\u8d77\u8a34\u8acb\u6c42\u88ab\u544a\u8fd4\u9084\u4e09\u842c\u4e8c\u5343\u4e94\u767e\u96f6\u4e8c\u5143\uff0c\u70ba\\n    \u7121\u7406\u7531\uff0c\u61c9\u4e88\u99c1\u56de\u3002\u53c8\u672c\u4ef6\u4fc2\u884c\u7c21\u6613\u8a34\u8a1f\u7a0b\u5e8f\uff0c\u7230\u4e0d\u7d93\u8a00\u8a5e\u8faf\u8ad6\u9015\u70ba\u5224\u6c7a\uff0c\u9644\u6b64\\n    \u6558\u660e\u3002\\n\u4e94\u3001\u64da\u4e0a\u8ad6\u7d50\uff0c\u672c\u4ef6\u539f\u544a\u4e4b\u8a34\u70ba\u7121\u7406\u7531\uff0c\u7230\u4f9d\u884c\u653f\u8a34\u8a1f\u6cd5\u7b2c\u4e8c\u767e\u4e09\u5341\u4e09\u689d\u7b2c\u4e00\u9805\u3001\u7b2c\\n    \u4e8c\u767e\u4e09\u5341\u516d\u689d\u3001\u7b2c\u4e00\u767e\u4e5d\u5341\u4e94\u689d\u7b2c\u4e00\u9805\u5f8c\u6bb5\u3001\u7b2c\u4e5d\u5341\u516b\u689d\u7b2c\u4e09\u9805\u524d\u6bb5\uff0c\u5224\u6c7a\u5982\u4e3b\\n    \u6587\u3002\\n\u4e2d      \u83ef      \u6c11      \u570b    \u4e5d\u5341\u4e00    \u5e74      \u5341\u4e00    \u6708      \u5341\u4e00    \u65e5\\n                              \u9ad8\u96c4\u9ad8\u7b49\u884c\u653f\u6cd5\u9662\u7b2c\u4e00\u5ead\\n                                          \u6cd5      \u5b98  \u674e\u5354\u660e\\n\u53f3\u70ba\u6b63\u672c\u4fc2\u7167\u539f\u672c\u4f5c\u6210\u3002\\n\u5982\u4e0d\u670d\u672c\u5224\u6c7a\uff0c\u61c9\u65bc\u9001\u9054\u5f8c\u4e8c\u5341\u65e5\u5167\uff0c\u5411\u672c\u9662\u63d0\u51fa\u4e0a\u8a34\u72c0\u4e26\u8868\u660e\u4e0a\u8a34\u7406\u7531\uff0c\u5982\u65bc\u672c\u5224\\n\u6c7a\u5ba3\u793a\u5f8c\u9001\u9054\u524d\u63d0\u8d77\u4e0a\u8a34\u8005\uff0c\u61c9\u65bc\u5224\u6c7a\u9001\u9054\u5f8c\u4e8c\u5341\u65e5\u5167\u88dc\u63d0\u4e0a\u8a34\u7406\u7531\u66f8\uff08\u9808\u6309\u4ed6\u9020\u7576\\n\u4e8b\u4eba\u4eba\u6578\u9644\u7e55\u672c\uff09\u3002\\n\u63d0\u8d77\u4e0a\u8a34\u61c9\u9810\u7e73\u9001\u9054\u7528\u96d9\u639b\u865f\u90f5\u7968\u4e03\u4efd\uff08\u6bcf\u4efd\u4e09\u5341\u56db\u5143\uff09\u3002\\n\u4e2d      \u83ef      \u6c11      \u570b    \u4e5d\u5341\u4e00    \u5e74      \u5341\u4e00    \u6708      \u5341\u4e00    \u65e5\\n                                          \u6cd5\u9662\u66f8\u8a18\u5b98  \u8521\u73ab\u82b3\\n\u9644\u8a3b\uff1a\\n\u884c\u653f\u8a34\u8a1f\u6cd5\u7b2c\u4e8c\u767e\u4e09\u5341\u4e94\u689d\uff08\u7b2c\u4e00\u9805\u3001\u7b2c\u4e8c\u9805\uff09\uff1a\\n\u5c0d\u65bc\u9069\u7528\u7c21\u6613\u7a0b\u5e8f\u4e4b\u88c1\u5224\u63d0\u8d77\u4e0a\u8a34\u6216\u6297\u544a\uff0c\u9808\u7d93\u6700\u9ad8\u884c\u653f\u6cd5\u9662\u4e4b\u8a31\u53ef\u3002\\n\u524d\u9805\u8a31\u53ef\uff0c\u4ee5\u8a34\u8a1f\u4e8b\u4ef6\u6240\u6d89\u53ca\u4e4b\u6cd5\u5f8b\u898b\u89e3\u5177\u6709\u539f\u5247\u6027\u8005\u70ba\u9650\u3002\\n\",\n  \"structure\": {\n    \"main\": \"\u539f\u544a\u4e4b\u8a34\u99c1\u56de\u3002\\n\u8a34\u8a1f\u8cbb\u7528\u7531\u539f\u544a\u8ca0\u64d4\u3002\",\n    \"fact\": \"\u4e00\u3001\u7de3\u88ab\u544a\u5206\u5225\u65bc\u6c11\u570b\uff08\u4e0b\u540c\uff09\u516b\u5341\u56db\u5e74\u5341\u6708\u4e09\u5341\u65e5\u8d77\u81f3\u516b\u5341\u516d\u5e74\u4e03\u6708\u4e8c\u5341\u56db\u65e5\u6b62\u3001\\n    \u516b\u5341\u516d\u5e74\u4e5d\u6708\u5341\u4e00\u65e5\u8d77\u81f3\u516b\u5341\u4e03\u5e74\u516b\u6708\u516d\u65e5\u6b62\u3001\u516b\u5341\u4e03\u5e74\uff08\u539f\u544a\u8aa4\u66f8\u70ba\u516b\u5341\u4e5d\u5e74\\n    \uff09\u4e5d\u6708\u4e8c\u5341\u4e09\u65e5\u8d77\u81f3\u516b\u5341\u516b\u5e74\u4e03\u6708\u4e8c\u65e5\u6b62\u96e2\u5bb6\u51fa\u8d70\uff0c\u539f\u544a\u4e3b\u5f35\u4f9d\u884c\u70ba\u6642\u5168\u6c11\u5065\u5eb7\\n    \u4fdd\u96aa\u6cd5\u7b2c\u5341\u4e00\u689d\u7b2c\u4e09\u6b3e\u898f\u5b9a\uff0c\u4e0d\u5f97\u53c3\u52a0\u5168\u6c11\u5065\u5eb7\u4fdd\u96aa\uff0c\u5df2\u53c3\u52a0\u8005\uff0c\u61c9\u4e88\u9000\u4fdd\uff0c\u60df\\n    \u88ab\u544a\u537b\u65bc\u4e0a\u958b\u671f\u9593\uff0c\u4ee5\u5065\u4fdd\u8eab\u5206\u5c31\u8a3a\u8207\u4f4f\u9662\uff0c\u81f4\u539f\u544a\u652f\u51fa\u91ab\u7642\u8cbb\u7528\u5171\u8a08\u65b0\u53f0\u5e63\uff08\\n    \u4e0b\u540c\uff09\u4e09\u842c\u56db\u5343\u516b\u767e\u516d\u5341\u4e8c\u5143\uff0c\u9042\u63d0\u8d77\u672c\u4ef6\u8a34\u8a1f\u4e3b\u5f35\u88ab\u544a\u65bc\u4e0a\u8ff0\u671f\u9593\u5931\u8e64\uff0c\u4f9d\u884c\\n    \u70ba\u6642\u5168\u6c11\u5065\u5eb7\u4fdd\u96aa\u6cd5\u7b2c\u5341\u4e00\u689d\u7b2c\u4e09\u6b3e\u898f\u5b9a\u5df2\u8fa6\u7406\u9000\u4fdd\uff0c\u7136\u88ab\u544a\u537b\u65bc\u4e0a\u958b\u671f\u9593\uff0c\u4ee5\\n    \u5065\u4fdd\u8eab\u5206\u5c31\u8a3a\u8207\u4f4f\u9662\uff0c\u81f4\u539f\u544a\u652f\u51fa\u91ab\u7642\u8cbb\u7528\u5171\u8a08\u4e09\u842c\u56db\u5343\u516b\u767e\u516d\u5341\u4e8c\u5143\uff0c\u6263\u9664\u61c9\\n    \u9000\u9084\u88ab\u544a\u4e4b\u4fdd\u96aa\u8cbb\u91d1\u984d\u4e8c\u5343\u4e09\u767e\u516d\u5341\u5143\u5f8c\uff0c\u88ab\u544a\u61c9\u8fd4\u9084\u91ab\u7642\u8cbb\u7528\u8a08\u4e09\u842c\u4e8c\u5343\u4e94\u767e\\n    \u96f6\u4e8c\u5143\uff0c\u7230\u4f9d\u516c\u6cd5\u4e0a\u4e0d\u7576\u5f97\u5229\u6cd5\u5f8b\u95dc\u4fc2\u8acb\u6c42\u88ab\u544a\u8fd4\u9084\u4e0a\u958b\u91ab\u7642\u8cbb\u7528\u3002\\n\u4e8c\u3001\u6309\u300c\u6709\u4e0b\u5217\u60c5\u5f62\u4e4b\u4e00\u8005\uff0c\u975e\u5c6c\u672c\u4fdd\u96aa\u4fdd\u96aa\u5c0d\u8c61\uff0c\u5df2\u53c3\u52a0\u8005\uff0c\u61c9\u4e88\u9000\u4fdd\uff1a\uff0e\uff0e\uff0e\u4e09\\n    \u3001\u5931\u8e64\u6eff\u516d\u500b\u6708\u8005\u3002\u300d\u3001\u300c\u672c\u6cd5\u7b2c\u5341\u4e00\u689d\u6240\u7a31\u5931\u8e64\uff0c\u6307\u6236\u7c4d\u767b\u8a18\u7c3f\u8a3b\u8a18\u5931\u8e64\u6216\u884c\\n    \u65b9\u4e0d\u660e\u3002\u4fdd\u96aa\u5c0d\u8c61\u56e0\u906d\u9047\u707d\u96e3\u5931\u8e64\uff0c\u5f97\u81ea\u8a72\u707d\u96e3\u767c\u751f\u4e4b\u65e5\u9000\u4fdd\u3002\u300d\u884c\u70ba\u6642\u5168\u6c11\u5065\\n    \u5eb7\u4fdd\u96aa\u6cd5\u7b2c\u5341\u4e00\u689d\u7b2c\u4e09\u6b3e\u53ca\u540c\u6cd5\u65bd\u884c\u7d30\u5247\u7b2c\u4e09\u5341\u4e94\u689d\u5b9a\u6709\u660e\u6587\u3002\\n\u4e09\u3001\u7d93\u67e5\uff0c\u88ab\u544a\u5206\u5225\u65bc\u516b\u5341\u56db\u5e74\u5341\u6708\u4e09\u5341\u65e5\u8d77\u81f3\u516b\u5341\u516d\u5e74\u4e03\u6708\u4e8c\u5341\u56db\u65e5\u6b62\u3001\u516b\u5341\u516d\u5e74\\n    \u4e5d\u6708\u5341\u4e00\u65e5\u8d77\u81f3\u516b\u5341\u4e03\u5e74\u516b\u6708\u516d\u65e5\u6b62\u3001\u516b\u5341\u4e03\u5e74\u4e5d\u6708\u4e8c\u5341\u4e09\u65e5\u8d77\u81f3\u516b\u5341\u516b\u5e74\u4e03\u6708\\n    \u4e8c\u65e5\u6b62\u96e2\u5bb6\u51fa\u8d70\uff0c\u4e26\u65bc\u4e0a\u958b\u671f\u9593\uff0c\u4ee5\u5065\u4fdd\u8eab\u5206\u5c31\u8a3a\u8207\u4f4f\u9662\uff0c\u81f4\u539f\u544a\u652f\u51fa\u91ab\u7642\u8cbb\u7528\\n    \u5171\u8a08\u4e09\u842c\u56db\u5343\u516b\u767e\u516d\u5341\u4e8c\u5143\uff0c\u696d\u64da\u539f\u544a\u63d0\u51fa\u8b66\u653f\u7f72\u67e5\u5c0b\u4eba\u53e3\u4f5c\u696d\u500b\u5225\u67e5\u8a62\u5831\u8868\u3001\\n    \u91ab\u4e8b\u6a5f\u69cb\u8cbb\u7528\u7533\u5831\u8868\u3001\u539f\u544a\u6c42\u511f\u91d1\u984d\u8a08\u7b97\u8868\u7b49\u5f71\u672c\u9644\u5377\u53ef\u7a3d\uff0c\u88ab\u544a\u7d93\u9001\u9054\u8d77\u8a34\u72c0\\n    \u5f8c\uff0c\u672a\u63d0\u51fa\u4efb\u4f55\u7b54\u8faf\u4ee5\u4f9b\u672c\u9662\u659f\u914c\uff0c\u662f\u524d\u63ed\u4e8b\u5be6\uff0c\u582a\u4e88\u8a8d\u5b9a\u3002\u60df\u6240\u8b02\u5931\u8e64\u4f9d\u5168\u6c11\\n    \u5065\u5eb7\u4fdd\u96aa\u6cd5\u65bd\u884c\u7d30\u5247\u7b2c\u4e09\u5341\u4e94\u689d\u898f\u5b9a\uff0c\u4fc2\u6307\u6236\u7c4d\u767b\u8a18\u7c3f\u8a3b\u8a18\u5931\u8e64\u6216\u884c\u65b9\u4e0d\u660e\uff0c\u64da\\n    \u539f\u544a\u6240\u63d0\u4e4b\u88ab\u544a\u5168\u6236\u6236\u7c4d\u8cc7\u6599\uff0c\u4e26\u672a\u986f\u793a\u88ab\u544a\u66fe\u88ab\u8a3b\u8a18\u70ba\u5931\u8e64\u6216\u884c\u65b9\u4e0d\u660e\uff0c\u5247\u88ab\\n    \u544a\u4e0d\u7b26\u5408\u5168\u6c11\u5065\u5eb7\u4fdd\u96aa\u6cd5\u7b2c\u5341\u4e00\u689d\u7b2c\u4e09\u6b3e\u6240\u8b02\u5931\u8e64\u6eff\u516d\u500b\u6708\u4e4b\u898f\u5b9a\u751a\u660e\u3002\u53c8\u5168\u6c11\\n    \u5065\u4fdd\u5c6c\u65bc\u4e00\u7a2e\u793e\u6703\u4e92\u52a9\u3001\u5371\u96aa\u5206\u64d4\u4e4b\u793e\u6703\u4fdd\u96aa\u5236\u5ea6\uff0c\u4e26\u63a1\u53d6\u5f37\u5236\u4fdd\u96aa\u65b9\u5f0f\uff0c\u5982\u88ab\\n    \u544a\u50c5\u4fc2\u55ae\u7d14\u96e2\u5bb6\u51fa\u8d70\u903e\u516d\u500b\u6708\uff0c\u5373\u9808\u5f37\u5236\u9000\u4fdd\uff0c\u986f\u672a\u9054\u5230\u5168\u6c11\u5065\u4fdd\u4e4b\u7acb\u6cd5\u76ee\u7684\uff0c\\n    \u4e14\u6240\u8b02\u5931\u8e64\u4ea6\u9808\u5931\u8e64\u4eba\u96e2\u958b\u6700\u5f8c\u7684\u4f4f\u6240\u6216\u5c45\u6240\u800c\u751f\u6b7b\u4e0d\u660e\uff0c\u751f\u6b7b\u4e0d\u660e\u5247\u9808\u4f9d\u5e38\u7406\\n    \u5224\u65b7\uff0c\u5230\u5e95\u662f\u751f\u5b58\u6216\u6b7b\u4ea1\u7121\u6cd5\u65b7\u5b9a\uff0c\u59cb\u53ef\u7a31\u4e4b\u70ba\u5931\u8e64\uff08\u738b\u60e0\u5149\u3001\u9ec3\u78a7\u82ac\u3001\u99f1\u5fd7\u8c6a\\n    \u5408\u8457\u767d\u8a71\u516d\u6cd5\u7e3d\u5247\u50b5\u7bc7\u4e8c\uff10\uff10\u4e00\u5e74\u4e8c\u6708\u4e8c\u7248\u4e00\u5237\u7b2c\u4e8c\u56db\u9801\uff09\uff0c\u88ab\u544a\u4e4b\u55ae\u7d14\u6163\u6027\u96e2\\n    \u5bb6\uff0c\u61c9\u4e0d\u5305\u62ec\u5728\u5167\u3002\\n\u56db\u3001\u7d9c\u4e0a\u6240\u8ff0\uff0c\u88ab\u544a\u65e2\u4e0d\u7b26\u5408\u884c\u70ba\u6642\u5168\u6c11\u5065\u5eb7\u4fdd\u96aa\u6cd5\u7b2c\u5341\u4e00\u689d\u7b2c\u4e09\u6b3e\u9000\u4fdd\u4e4b\u898f\u5b9a\uff0c\u539f\\n    \u544a\u4f9d\u64da\u516c\u6cd5\u4e0a\u4e0d\u7576\u5f97\u5229\u4e4b\u6cd5\u5f8b\u95dc\u4fc2\uff0c\u8d77\u8a34\u8acb\u6c42\u88ab\u544a\u8fd4\u9084\u4e09\u842c\u4e8c\u5343\u4e94\u767e\u96f6\u4e8c\u5143\uff0c\u70ba\\n    \u7121\u7406\u7531\uff0c\u61c9\u4e88\u99c1\u56de\u3002\u53c8\u672c\u4ef6\u4fc2\u884c\u7c21\u6613\u8a34\u8a1f\u7a0b\u5e8f\uff0c\u7230\u4e0d\u7d93\u8a00\u8a5e\u8faf\u8ad6\u9015\u70ba\u5224\u6c7a\uff0c\u9644\u6b64\\n    \u6558\u660e\u3002\\n\u4e94\u3001\u64da\u4e0a\u8ad6\u7d50\uff0c\u672c\u4ef6\u539f\u544a\u4e4b\u8a34\u70ba\u7121\u7406\u7531\uff0c\u7230\u4f9d\u884c\u653f\u8a34\u8a1f\u6cd5\u7b2c\u4e8c\u767e\u4e09\u5341\u4e09\u689d\u7b2c\u4e00\u9805\u3001\u7b2c\\n    \u4e8c\u767e\u4e09\u5341\u516d\u689d\u3001\u7b2c\u4e00\u767e\u4e5d\u5341\u4e94\u689d\u7b2c\u4e00\u9805\u5f8c\u6bb5\u3001\u7b2c\u4e5d\u5341\u516b\u689d\u7b2c\u4e09\u9805\u524d\u6bb5\uff0c\u5224\u6c7a\u5982\u4e3b\\n    \u6587\u3002\",\n    \"reason\": \"\u4e00\u3001\u7de3\u88ab\u544a\u5206\u5225\u65bc\u6c11\u570b\uff08\u4e0b\u540c\uff09\u516b\u5341\u56db\u5e74\u5341\u6708\u4e09\u5341\u65e5\u8d77\u81f3\u516b\u5341\u516d\u5e74\u4e03\u6708\u4e8c\u5341\u56db\u65e5\u6b62\u3001\\n    \u516b\u5341\u516d\u5e74\u4e5d\u6708\u5341\u4e00\u65e5\u8d77\u81f3\u516b\u5341\u4e03\u5e74\u516b\u6708\u516d\u65e5\u6b62\u3001\u516b\u5341\u4e03\u5e74\uff08\u539f\u544a\u8aa4\u66f8\u70ba\u516b\u5341\u4e5d\u5e74\\n    \uff09\u4e5d\u6708\u4e8c\u5341\u4e09\u65e5\u8d77\u81f3\u516b\u5341\u516b\u5e74\u4e03\u6708\u4e8c\u65e5\u6b62\u96e2\u5bb6\u51fa\u8d70\uff0c\u539f\u544a\u4e3b\u5f35\u4f9d\u884c\u70ba\u6642\u5168\u6c11\u5065\u5eb7\\n    \u4fdd\u96aa\u6cd5\u7b2c\u5341\u4e00\u689d\u7b2c\u4e09\u6b3e\u898f\u5b9a\uff0c\u4e0d\u5f97\u53c3\u52a0\u5168\u6c11\u5065\u5eb7\u4fdd\u96aa\uff0c\u5df2\u53c3\u52a0\u8005\uff0c\u61c9\u4e88\u9000\u4fdd\uff0c\u60df\\n    \u88ab\u544a\u537b\u65bc\u4e0a\u958b\u671f\u9593\uff0c\u4ee5\u5065\u4fdd\u8eab\u5206\u5c31\u8a3a\u8207\u4f4f\u9662\uff0c\u81f4\u539f\u544a\u652f\u51fa\u91ab\u7642\u8cbb\u7528\u5171\u8a08\u65b0\u53f0\u5e63\uff08\\n    \u4e0b\u540c\uff09\u4e09\u842c\u56db\u5343\u516b\u767e\u516d\u5341\u4e8c\u5143\uff0c\u9042\u63d0\u8d77\u672c\u4ef6\u8a34\u8a1f\u4e3b\u5f35\u88ab\u544a\u65bc\u4e0a\u8ff0\u671f\u9593\u5931\u8e64\uff0c\u4f9d\u884c\\n    \u70ba\u6642\u5168\u6c11\u5065\u5eb7\u4fdd\u96aa\u6cd5\u7b2c\u5341\u4e00\u689d\u7b2c\u4e09\u6b3e\u898f\u5b9a\u5df2\u8fa6\u7406\u9000\u4fdd\uff0c\u7136\u88ab\u544a\u537b\u65bc\u4e0a\u958b\u671f\u9593\uff0c\u4ee5\\n    \u5065\u4fdd\u8eab\u5206\u5c31\u8a3a\u8207\u4f4f\u9662\uff0c\u81f4\u539f\u544a\u652f\u51fa\u91ab\u7642\u8cbb\u7528\u5171\u8a08\u4e09\u842c\u56db\u5343\u516b\u767e\u516d\u5341\u4e8c\u5143\uff0c\u6263\u9664\u61c9\\n    \u9000\u9084\u88ab\u544a\u4e4b\u4fdd\u96aa\u8cbb\u91d1\u984d\u4e8c\u5343\u4e09\u767e\u516d\u5341\u5143\u5f8c\uff0c\u88ab\u544a\u61c9\u8fd4\u9084\u91ab\u7642\u8cbb\u7528\u8a08\u4e09\u842c\u4e8c\u5343\u4e94\u767e\\n    \u96f6\u4e8c\u5143\uff0c\u7230\u4f9d\u516c\u6cd5\u4e0a\u4e0d\u7576\u5f97\u5229\u6cd5\u5f8b\u95dc\u4fc2\u8acb\u6c42\u88ab\u544a\u8fd4\u9084\u4e0a\u958b\u91ab\u7642\u8cbb\u7528\u3002\\n\u4e8c\u3001\u6309\u300c\u6709\u4e0b\u5217\u60c5\u5f62\u4e4b\u4e00\u8005\uff0c\u975e\u5c6c\u672c\u4fdd\u96aa\u4fdd\u96aa\u5c0d\u8c61\uff0c\u5df2\u53c3\u52a0\u8005\uff0c\u61c9\u4e88\u9000\u4fdd\uff1a\uff0e\uff0e\uff0e\u4e09\\n    \u3001\u5931\u8e64\u6eff\u516d\u500b\u6708\u8005\u3002\u300d\u3001\u300c\u672c\u6cd5\u7b2c\u5341\u4e00\u689d\u6240\u7a31\u5931\u8e64\uff0c\u6307\u6236\u7c4d\u767b\u8a18\u7c3f\u8a3b\u8a18\u5931\u8e64\u6216\u884c\\n    \u65b9\u4e0d\u660e\u3002\u4fdd\u96aa\u5c0d\u8c61\u56e0\u906d\u9047\u707d\u96e3\u5931\u8e64\uff0c\u5f97\u81ea\u8a72\u707d\u96e3\u767c\u751f\u4e4b\u65e5\u9000\u4fdd\u3002\u300d\u884c\u70ba\u6642\u5168\u6c11\u5065\\n    \u5eb7\u4fdd\u96aa\u6cd5\u7b2c\u5341\u4e00\u689d\u7b2c\u4e09\u6b3e\u53ca\u540c\u6cd5\u65bd\u884c\u7d30\u5247\u7b2c\u4e09\u5341\u4e94\u689d\u5b9a\u6709\u660e\u6587\u3002\\n\u4e09\u3001\u7d93\u67e5\uff0c\u88ab\u544a\u5206\u5225\u65bc\u516b\u5341\u56db\u5e74\u5341\u6708\u4e09\u5341\u65e5\u8d77\u81f3\u516b\u5341\u516d\u5e74\u4e03\u6708\u4e8c\u5341\u56db\u65e5\u6b62\u3001\u516b\u5341\u516d\u5e74\\n    \u4e5d\u6708\u5341\u4e00\u65e5\u8d77\u81f3\u516b\u5341\u4e03\u5e74\u516b\u6708\u516d\u65e5\u6b62\u3001\u516b\u5341\u4e03\u5e74\u4e5d\u6708\u4e8c\u5341\u4e09\u65e5\u8d77\u81f3\u516b\u5341\u516b\u5e74\u4e03\u6708\\n    \u4e8c\u65e5\u6b62\u96e2\u5bb6\u51fa\u8d70\uff0c\u4e26\u65bc\u4e0a\u958b\u671f\u9593\uff0c\u4ee5\u5065\u4fdd\u8eab\u5206\u5c31\u8a3a\u8207\u4f4f\u9662\uff0c\u81f4\u539f\u544a\u652f\u51fa\u91ab\u7642\u8cbb\u7528\\n    \u5171\u8a08\u4e09\u842c\u56db\u5343\u516b\u767e\u516d\u5341\u4e8c\u5143\uff0c\u696d\u64da\u539f\u544a\u63d0\u51fa\u8b66\u653f\u7f72\u67e5\u5c0b\u4eba\u53e3\u4f5c\u696d\u500b\u5225\u67e5\u8a62\u5831\u8868\u3001\\n    \u91ab\u4e8b\u6a5f\u69cb\u8cbb\u7528\u7533\u5831\u8868\u3001\u539f\u544a\u6c42\u511f\u91d1\u984d\u8a08\u7b97\u8868\u7b49\u5f71\u672c\u9644\u5377\u53ef\u7a3d\uff0c\u88ab\u544a\u7d93\u9001\u9054\u8d77\u8a34\u72c0\\n    \u5f8c\uff0c\u672a\u63d0\u51fa\u4efb\u4f55\u7b54\u8faf\u4ee5\u4f9b\u672c\u9662\u659f\u914c\uff0c\u662f\u524d\u63ed\u4e8b\u5be6\uff0c\u582a\u4e88\u8a8d\u5b9a\u3002\u60df\u6240\u8b02\u5931\u8e64\u4f9d\u5168\u6c11\\n    \u5065\u5eb7\u4fdd\u96aa\u6cd5\u65bd\u884c\u7d30\u5247\u7b2c\u4e09\u5341\u4e94\u689d\u898f\u5b9a\uff0c\u4fc2\u6307\u6236\u7c4d\u767b\u8a18\u7c3f\u8a3b\u8a18\u5931\u8e64\u6216\u884c\u65b9\u4e0d\u660e\uff0c\u64da\\n    \u539f\u544a\u6240\u63d0\u4e4b\u88ab\u544a\u5168\u6236\u6236\u7c4d\u8cc7\u6599\uff0c\u4e26\u672a\u986f\u793a\u88ab\u544a\u66fe\u88ab\u8a3b\u8a18\u70ba\u5931\u8e64\u6216\u884c\u65b9\u4e0d\u660e\uff0c\u5247\u88ab\\n    \u544a\u4e0d\u7b26\u5408\u5168\u6c11\u5065\u5eb7\u4fdd\u96aa\u6cd5\u7b2c\u5341\u4e00\u689d\u7b2c\u4e09\u6b3e\u6240\u8b02\u5931\u8e64\u6eff\u516d\u500b\u6708\u4e4b\u898f\u5b9a\u751a\u660e\u3002\u53c8\u5168\u6c11\\n    \u5065\u4fdd\u5c6c\u65bc\u4e00\u7a2e\u793e\u6703\u4e92\u52a9\u3001\u5371\u96aa\u5206\u64d4\u4e4b\u793e\u6703\u4fdd\u96aa\u5236\u5ea6\uff0c\u4e26\u63a1\u53d6\u5f37\u5236\u4fdd\u96aa\u65b9\u5f0f\uff0c\u5982\u88ab\\n    \u544a\u50c5\u4fc2\u55ae\u7d14\u96e2\u5bb6\u51fa\u8d70\u903e\u516d\u500b\u6708\uff0c\u5373\u9808\u5f37\u5236\u9000\u4fdd\uff0c\u986f\u672a\u9054\u5230\u5168\u6c11\u5065\u4fdd\u4e4b\u7acb\u6cd5\u76ee\u7684\uff0c\\n    \u4e14\u6240\u8b02\u5931\u8e64\u4ea6\u9808\u5931\u8e64\u4eba\u96e2\u958b\u6700\u5f8c\u7684\u4f4f\u6240\u6216\u5c45\u6240\u800c\u751f\u6b7b\u4e0d\u660e\uff0c\u751f\u6b7b\u4e0d\u660e\u5247\u9808\u4f9d\u5e38\u7406\\n    \u5224\u65b7\uff0c\u5230\u5e95\u662f\u751f\u5b58\u6216\u6b7b\u4ea1\u7121\u6cd5\u65b7\u5b9a\uff0c\u59cb\u53ef\u7a31\u4e4b\u70ba\u5931\u8e64\uff08\u738b\u60e0\u5149\u3001\u9ec3\u78a7\u82ac\u3001\u99f1\u5fd7\u8c6a\\n    \u5408\u8457\u767d\u8a71\u516d\u6cd5\u7e3d\u5247\u50b5\u7bc7\u4e8c\uff10\uff10\u4e00\u5e74\u4e8c\u6708\u4e8c\u7248\u4e00\u5237\u7b2c\u4e8c\u56db\u9801\uff09\uff0c\u88ab\u544a\u4e4b\u55ae\u7d14\u6163\u6027\u96e2\\n    \u5bb6\uff0c\u61c9\u4e0d\u5305\u62ec\u5728\u5167\u3002\\n\u56db\u3001\u7d9c\u4e0a\u6240\u8ff0\uff0c\u88ab\u544a\u65e2\u4e0d\u7b26\u5408\u884c\u70ba\u6642\u5168\u6c11\u5065\u5eb7\u4fdd\u96aa\u6cd5\u7b2c\u5341\u4e00\u689d\u7b2c\u4e09\u6b3e\u9000\u4fdd\u4e4b\u898f\u5b9a\uff0c\u539f\\n    \u544a\u4f9d\u64da\u516c\u6cd5\u4e0a\u4e0d\u7576\u5f97\u5229\u4e4b\u6cd5\u5f8b\u95dc\u4fc2\uff0c\u8d77\u8a34\u8acb\u6c42\u88ab\u544a\u8fd4\u9084\u4e09\u842c\u4e8c\u5343\u4e94\u767e\u96f6\u4e8c\u5143\uff0c\u70ba\\n    \u7121\u7406\u7531\uff0c\u61c9\u4e88\u99c1\u56de\u3002\u53c8\u672c\u4ef6\u4fc2\u884c\u7c21\u6613\u8a34\u8a1f\u7a0b\u5e8f\uff0c\u7230\u4e0d\u7d93\u8a00\u8a5e\u8faf\u8ad6\u9015\u70ba\u5224\u6c7a\uff0c\u9644\u6b64\\n    \u6558\u660e\u3002\\n\u4e94\u3001\u64da\u4e0a\u8ad6\u7d50\uff0c\u672c\u4ef6\u539f\u544a\u4e4b\u8a34\u70ba\u7121\u7406\u7531\uff0c\u7230\u4f9d\u884c\u653f\u8a34\u8a1f\u6cd5\u7b2c\u4e8c\u767e\u4e09\u5341\u4e09\u689d\u7b2c\u4e00\u9805\u3001\u7b2c\\n    \u4e8c\u767e\u4e09\u5341\u516d\u689d\u3001\u7b2c\u4e00\u767e\u4e5d\u5341\u4e94\u689d\u7b2c\u4e00\u9805\u5f8c\u6bb5\u3001\u7b2c\u4e5d\u5341\u516b\u689d\u7b2c\u4e09\u9805\u524d\u6bb5\uff0c\u5224\u6c7a\u5982\u4e3b\\n    \u6587\u3002\"\n  },\n  \"search\": \"\u9ad8\u96c4\u9ad8\u7b49\u884c\u653f\u6cd5\u9662\u7c21\u6613\u5224\u6c7a\u4e5d\u5341\u4e00\u5e74\u5ea6\u7c21\u5b57\u7b2c\u4e00\u4e5d\uff10\u865f\u539f\u544a\u4e2d\u592e\u5065\u5eb7\u4fdd\u96aa\u5c40\u4ee3\u8868\u4eba\u7532\u25cb\u25cb\u8a34\u8a1f\u4ee3\u7406\u4eba\u674e\u91d1\u6fa4\u5f8b\u5e2b\u88ab\u544a\u4e59\u25cb\u25cb\u53f3\u7576\u4e8b\u4eba\u9593\u56e0\u8fd4\u9084\u516c\u6cd5\u4e0a\u4e0d\u7576\u5f97\u5229\u4e8b\u4ef6\uff0c\u539f\u544a\u63d0\u8d77\u884c\u653f\u8a34\u8a1f\u3002\u672c\u9662\u5224\u6c7a\u5982\u5de6\uff1a\u4e3b\u6587\u539f\u544a\u4e4b\u8a34\u99c1\u56de\u3002\u8a34\u8a1f\u8cbb\u7528\u7531\u539f\u544a\u8ca0\u64d4\u3002\u4e8b\u5be6\u53ca\u7406\u7531\u4e00\u3001\u7de3\u88ab\u544a\u5206\u5225\u65bc\u6c11\u570b\uff08\u4e0b\u540c\uff09\u516b\u5341\u56db\u5e74\u5341\u6708\u4e09\u5341\u65e5\u8d77\u81f3\u516b\u5341\u516d\u5e74\u4e03\u6708\u4e8c\u5341\u56db\u65e5\u6b62\u3001\u516b\u5341\u516d\u5e74\u4e5d\u6708\u5341\u4e00\u65e5\u8d77\u81f3\u516b\u5341\u4e03\u5e74\u516b\u6708\u516d\u65e5\u6b62\u3001\u516b\u5341\u4e03\u5e74\uff08\u539f\u544a\u8aa4\u66f8\u70ba\u516b\u5341\u4e5d\u5e74\uff09\u4e5d\u6708\u4e8c\u5341\u4e09\u65e5\u8d77\u81f3\u516b\u5341\u516b\u5e74\u4e03\u6708\u4e8c\u65e5\u6b62\u96e2\u5bb6\u51fa\u8d70\uff0c\u539f\u544a\u4e3b\u5f35\u4f9d\u884c\u70ba\u6642\u5168\u6c11\u5065\u5eb7\u4fdd\u96aa\u6cd5\u7b2c\u5341\u4e00\u689d\u7b2c\u4e09\u6b3e\u898f\u5b9a\uff0c\u4e0d\u5f97\u53c3\u52a0\u5168\u6c11\u5065\u5eb7\u4fdd\u96aa\uff0c\u5df2\u53c3\u52a0\u8005\uff0c\u61c9\u4e88\u9000\u4fdd\uff0c\u60df\u88ab\u544a\u537b\u65bc\u4e0a\u958b\u671f\u9593\uff0c\u4ee5\u5065\u4fdd\u8eab\u5206\u5c31\u8a3a\u8207\u4f4f\u9662\uff0c\u81f4\u539f\u544a\u652f\u51fa\u91ab\u7642\u8cbb\u7528\u5171\u8a08\u65b0\u53f0\u5e63\uff08\u4e0b\u540c\uff09\u4e09\u842c\u56db\u5343\u516b\u767e\u516d\u5341\u4e8c\u5143\uff0c\u9042\u63d0\u8d77\u672c\u4ef6\u8a34\u8a1f\u4e3b\u5f35\u88ab\u544a\u65bc\u4e0a\u8ff0\u671f\u9593\u5931\u8e64\uff0c\u4f9d\u884c\u70ba\u6642\u5168\u6c11\u5065\u5eb7\u4fdd\u96aa\u6cd5\u7b2c\u5341\u4e00\u689d\u7b2c\u4e09\u6b3e\u898f\u5b9a\u5df2\u8fa6\u7406\u9000\u4fdd\uff0c\u7136\u88ab\u544a\u537b\u65bc\u4e0a\u958b\u671f\u9593\uff0c\u4ee5\u5065\u4fdd\u8eab\u5206\u5c31\u8a3a\u8207\u4f4f\u9662\uff0c\u81f4\u539f\u544a\u652f\u51fa\u91ab\u7642\u8cbb\u7528\u5171\u8a08\u4e09\u842c\u56db\u5343\u516b\u767e\u516d\u5341\u4e8c\u5143\uff0c\u6263\u9664\u61c9\u9000\u9084\u88ab\u544a\u4e4b\u4fdd\u96aa\u8cbb\u91d1\u984d\u4e8c\u5343\u4e09\u767e\u516d\u5341\u5143\u5f8c\uff0c\u88ab\u544a\u61c9\u8fd4\u9084\u91ab\u7642\u8cbb\u7528\u8a08\u4e09\u842c\u4e8c\u5343\u4e94\u767e\u96f6\u4e8c\u5143\uff0c\u7230\u4f9d\u516c\u6cd5\u4e0a\u4e0d\u7576\u5f97\u5229\u6cd5\u5f8b\u95dc\u4fc2\u8acb\u6c42\u88ab\u544a\u8fd4\u9084\u4e0a\u958b\u91ab\u7642\u8cbb\u7528\u3002\u4e8c\u3001\u6309\u300c\u6709\u4e0b\u5217\u60c5\u5f62\u4e4b\u4e00\u8005\uff0c\u975e\u5c6c\u672c\u4fdd\u96aa\u4fdd\u96aa\u5c0d\u8c61\uff0c\u5df2\u53c3\u52a0\u8005\uff0c\u61c9\u4e88\u9000\u4fdd\uff1a\uff0e\uff0e\uff0e\u4e09\u3001\u5931\u8e64\u6eff\u516d\u500b\u6708\u8005\u3002\u300d\u3001\u300c\u672c\u6cd5\u7b2c\u5341\u4e00\u689d\u6240\u7a31\u5931\u8e64\uff0c\u6307\u6236\u7c4d\u767b\u8a18\u7c3f\u8a3b\u8a18\u5931\u8e64\u6216\u884c\u65b9\u4e0d\u660e\u3002\u4fdd\u96aa\u5c0d\u8c61\u56e0\u906d\u9047\u707d\u96e3\u5931\u8e64\uff0c\u5f97\u81ea\u8a72\u707d\u96e3\u767c\u751f\u4e4b\u65e5\u9000\u4fdd\u3002\u300d\u884c\u70ba\u6642\u5168\u6c11\u5065\u5eb7\u4fdd\u96aa\u6cd5\u7b2c\u5341\u4e00\u689d\u7b2c\u4e09\u6b3e\u53ca\u540c\u6cd5\u65bd\u884c\u7d30\u5247\u7b2c\u4e09\u5341\u4e94\u689d\u5b9a\u6709\u660e\u6587\u3002\u4e09\u3001\u7d93\u67e5\

<style>
  :root{
    --bg:#0d1117; --panel:#161b22; --panel2:#1c2330; --border:#2b3444;
    --ink:#e6edf3; --muted:#8b98a9; --accent:#6ea8fe; --good:#3fb950; --code:#0b0f16;
  }
  *{box-sizing:border-box}
  html,body{height:100%}
  body{margin:0;background:var(--bg);color:var(--ink);
    font:14px/1.55 -apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif}

  aside h1{font-size:15px;margin:0 0 2px}
  aside .sub{color:var(--muted);font-size:12px;margin-bottom:16px}
  .srcbtn{display:block;width:100%;text-align:left;background:transparent;border:1px solid transparent;
    color:var(--ink);border-radius:8px;padding:8px 10px;cursor:pointer;margin-bottom:3px}
  .srcbtn:hover{background:var(--panel2)}

    overflow:hidden;text-overflow:ellipsis;white-space:nowrap;margin-top:2px}

    color:var(--muted);font-family:ui-monospace,monospace;flex:none}
  main{overflow-y:auto}
  .topbar{position:sticky;top:0;z-index:5;background:rgba(13,17,23,.92);backdrop-filter:blur(6px);
    border-bottom:1px solid var(--border);padding:16px 24px}
  .topbar h2{margin:0;font-size:18px;display:flex;align-items:center;gap:10px}
  .topbar .repo{font-family:ui-monospace,monospace;font-size:12px;color:var(--accent);margin-top:4px}
  .topbar .blurb{color:var(--ink);margin-top:8px;max-width:760px}
  .how{color:var(--muted);font-size:12.5px;margin-top:8px;max-width:760px;
    border-left:2px solid var(--border);padding-left:12px}
  .facts{display:flex;gap:8px;flex-wrap:wrap;margin-top:12px}
  .chip{background:var(--panel2);border:1px solid var(--border);border-radius:99px;
    padding:2px 10px;font-size:12px;color:var(--muted)}
  .chip b{color:var(--ink);font-weight:600}
  .nav{display:flex;align-items:center;gap:8px;margin-top:14px}
  .nav button{background:var(--panel2);border:1px solid var(--border);color:var(--ink);
    border-radius:8px;padding:6px 12px;cursor:pointer;font-size:13px}
  .nav button:hover:not(:disabled){border-color:var(--accent)}
  .nav button:disabled{opacity:.4;cursor:default}
  .nav .pos{color:var(--muted);font-size:13px;font-family:ui-monospace,monospace;min-width:74px;text-align:center}
  .body{padding:24px;max-width:940px}
  .lbl{font-size:11px;text-transform:uppercase;letter-spacing:.07em;color:var(--muted);margin:0 0 6px}
  .ctx{background:var(--code);border:1px solid var(--border);border-radius:10px;padding:16px 18px;
    white-space:pre-wrap;word-break:break-word;
    font:13px/1.6 ui-monospace,SFMono-Regular,Menlo,Consolas,monospace;color:#c9d4e0}
  .blank{color:var(--accent);font-weight:700}
  .cands{margin-top:20px;display:flex;flex-direction:column;gap:8px}
  .cand{display:flex;gap:12px;align-items:flex-start;background:var(--panel2);
    border:1px solid var(--border);border-radius:8px;padding:11px 14px;
    font:13px/1.55 ui-monospace,SFMono-Regular,Menlo,Consolas,monospace}
  .cand.gold{border-color:var(--good);background:rgba(63,185,80,.12)}
  .cand .mark{flex:none;width:64px;color:var(--muted);font-size:11px;text-align:center;
    font-family:inherit;padding-top:1px}
  .cand.gold .mark{color:var(--good);font-weight:700}
  .cand .txt{white-space:pre-wrap;word-break:break-word;color:#c9d4e0}
  .target{margin-top:20px}
  .target .word{display:inline-block;background:rgba(63,185,80,.14);border:1px solid var(--good);
    color:var(--good);border-radius:8px;padding:6px 14px;font-family:ui-monospace,monospace;font-size:14px}
  .cont{color:var(--muted);font-size:12px;margin-top:12px}
  .cont code{color:var(--ink);background:var(--panel2);padding:1px 6px;border-radius:5px}
</style>

query": "High jump: The boy lands on his back on to a red mat. The boy gets up from the mat. The boy", "label": "1", "activity_label": "High jump", "ctx": "The boy lands on his back on to a red mat. The boy gets up from the mat. the boy"}}]}, {"name": "piqa", "dataset": "baber/piqa", "output_type": "multiple_choice", "split": "validation", "chance": 50.0, "blurb": "Physical commonsense: which of two solutions actually accomplishes the everyday goal.", "how_scored": "The model never generates. Each candidate is appended to the context and scored by length-normalized log-likelihood; the highest-scoring candidate is the model's answer. Accuracy = fraction where that argmax equals the gold choice.", "docs": [{"context": "Question: How do I ready a guinea pig cage for it's new occupants?\nAnswer:", "choices": ["Provide the guinea pig with a cage full of a few inches of bedding made of ripped paper strips, you will also need to supply it with a water bottle and a food dish.", "Provide the guinea pig with a cage full of a few inches of bedding made of ripped jeans material, you will also need to supply it with a water bottle and a food dish."], "gold": 0, "gold_text": "Provide the guinea pig with a cage full of a few inches of bedding made of ripped paper strips, you will also need to supply it with a water bottle and a food dish.", "target": 0, "raw": {"label": 0, "goal": "How do I ready a guinea pig cage for it's new occupants?", "sol1": "Provide the guinea pig with a cage full of a few inches of bedding made of ripped paper strips, you will also need to supply it with a water bottle and a food dish.", "sol2": "Provide the guinea pig with a cage full of a few inches of bedding made of ripped jeans material, you will also need to supply it with a water bottle and a food dish."}}, {"context": "Question: dresser\nAnswer:", "choices": ["replace drawer with bobby pin ", "finish, woodgrain with  bobby pin "], "gold": 1, "gold_text": "finish, woodgrain with  bobby pin ", "target": 1, "raw": {"label": 1, "goal": "dresser", "sol1": "replace drawer with bobby pin ", "sol2": "finish, woodgrain with  bobby pin "}}, {"context": "Question: To fight Ivan Drago in Rocky for sega master system.\nAnswer:", "choices": ["Drago isn't in this game because it was released before Rocky IV.", "You have to defeat Apollo Creed and Clubber Lang first."], "gold": 1, "gold_text": "You have to defeat Apollo Creed and Clubber Lang first.", "target": 1, "raw": {"label": 1, "goal": "To fight Ivan Drago in Rocky for sega master system.", "sol1": "Drago isn't in this game because it was released before Rocky IV.", "sol2": "You have to defeat Apollo Creed and Clubber Lang first."}}, {"context": "Question: Make outdoor pillow.\nAnswer:", "choices": ["Blow into tin can and tie with rubber band.", "Blow into trash bag and tie with rubber band."], "gold": 1, "gold_text": "Blow into trash bag and tie with rubber band.", "target": 1, "raw": {"label": 1, "goal": "Make outdoor pillow.", "sol1": "Blow into tin can and tie with rubber band.", "sol2": "Blow into trash bag and tie with rubber band."}}, {"context": "Question: ice box\nAnswer:", "choices": ["will turn into a cooler if you add water to it", "will turn into a cooler if you add soda to it"], "gold": 0, "gold_text": "will turn into a cooler if you add water to it", "target": 0, "raw": {"label": 0, "goal": "ice box", "sol1": "will turn into a cooler if you add water to it", "sol2": "will turn into a cooler if you add soda to it"}}, {"context": "Question: Remove soap scum from shower door.\nAnswer:", "choices": ["Rub hard with bed sheets, then rinse.", "Rub hard with dryer sheets, then rinse."], "gold": 1, "gold_text": "Rub hard with dryer sheets, then rinse.", "target": 1, "raw": {"label": 1, "goal": "Remove soap scum from shower door.", "sol1": "Rub hard with bed sheets, then rinse.", "sol2": "Rub hard with dryer sheets, then rinse."}}]}, {"name": "lambada_openai", "dataset": "EleutherAI/lambada_openai \u00b7 default", "output_type": "loglikelihood", "split": "test", "chance": 0.0, "blurb": "Long-range language modeling: predict the final word of a passage that needs the whole context.", "how_scored": "The gold continuation is appended to the context; the model is correct if the tokens it assigns highest probability match the target (greedy). Accuracy over all examples.", "docs": [{"context": "In my palm is a clear stone, and inside it is a small ivory statuette. A guardian angel.\n\n\"Figured if you're going to be out at night getting hit by cars, you might as well have some backup.\"\n\nI look at him, feeling stunned. Like this is some sort of sign. But as I stare at Harlin, his mouth curved in a confident grin, I don't care about", "choices": null, "gold": null, "gold_text": " signs", "target": " signs", "raw": {}}, {"context": "Give me a minute to change and I'll meet you at the docks.\" She'd forced those words through her teeth.\n\n\"No need to change. We won't be that long.\"\n\nShane gripped her arm and started leading her to the dock.\n\n\"I can make it there on my own,", "choices": null, "gold": null, "gold_text": " Shane", "target": " Shane", "raw": {}}, {"context": "\"Only one source I know of that would be likely to cough up enough money to finance a phony sleep research facility and pay people big bucks to solve crimes in their dreams,\" Farrell concluded dryly.\n\n\"What can I say?\" Ellis unfolded his arms and widened his hands. \"Your tax dollars at work.\"\n\nBefore Farrell could respond, Leila's voice rose from inside the house.\n\n\"No insurance?\" she wailed. \"What do you mean you don't have any", "choices": null, "gold": null, "gold_text": " insurance", "target": " insurance", "raw": {}}, {"context": "Helen's heart broke a little in the face of Miss Mabel's selfless courage. She thought that because she was old, her life was of less value than the others'. For all Helen knew, Miss Mabel had a lot more years to live than she did. \"Not going to happen,\" replied", "choices": null, "gold": null, "gold_text": " Helen", "target": " Helen", "raw": {}}, {"context": "Preston had been the last person to wear those chains, and I knew what I'd see and feel if they were slipped onto my skin-the Reaper's unending hatred of me. I'd felt enough of that emotion already in the amphitheater. I didn't want to feel anymore.\n\n\"Don't put those on me,\" I whispered. \"Please.\"\n\nSergei looked at me, surprised by my low, raspy please, but he put down the", "choices": null, "gold": null, "gold_text": " chains", "target": " chains", "raw": {}}, {"context": "She knew that Basha was a decent young man, that he was pretty sweet and friendly with her. Jawen knew they had a bit of a history, but she thought that this time she would get along better with him, that she could overlook those problems. \nThey kissed, and she knew that she liked Basha, but then Hastin interfered. She was so angry that she immediately said, once they were out of earshot of Basha, \u201cYou don\u2019t mean anything to me anymore,", "choices": null, "gold": null, "gold_text": " Hastin", "target": " Hastin", "raw": {}}]}, {"name": "arc_easy", "dataset": "allenai/ai2_arc \u00b7 ARC-Easy", "output_type": "multiple_choice", "split": "test", "chance": 25.0, "blurb": "Grade-school science multiple choice (the easy split).", "how_scored": "The model never generates. Each candidate is appended to the context and scored by length-normalized log-likelihood; the highest-scoring candidate is the model's answer. Accuracy = fraction where that argmax equals the gold choice.", "docs": [{"context": "Question: Which statement best explains why photosynthesis is the foundation of most food webs?\nAnswer:", "choices": ["Sunlight is the source of energy for nearly all ecosystems.", "Most ecosystems are found on land instead of in water.", "Carbon dioxide is more available than other gases.", "The producers in all ecosystems are plants."], "gold": 0, "gold_text": "Sunlight is the source of energy for nearly all ecosystems.", "target": 0, "raw": {"question": "Which statement best explains why photosynthesis is the foundation of most food webs?"}}, {"context": "Question: Which piece of safety equipment is used to keep mold spores from entering the respiratory system?\nAnswer:", "choices": ["safety goggles", "breathing mask", "rubber gloves", "lead apron"], "gold": 1, "gold_text": "breathing mask", "target": 1, "raw": {"question": "Which piece of safety equipment is used to keep mold spores from entering the respiratory system?"}}, {"context": "Question: Meiosis is a type of cell division in which germ cells divide to produce haploid cells. Where does meiosis occur?\nAnswer:", "choices": ["brain cells", "bone cells", "muscle cells", "ovary cells"], "gold": 3, "gold_text": "ovary cells", "target": 3, "raw": {"question": "Meiosis is a type of cell division in which germ cells divide to produce haploid cells. Where does meiosis occur?"}}, {"context": "Question: Which characteristic describes the texture of a kitten's fur?\nAnswer:", "choices": ["gray", "warm", "long", "soft"], "gold": 3, "gold_text": "soft", "target": 3, "raw": {"question": "Which characteristic describes the texture of a kitten's fur?"}}, {"context": "Question: Which best describes the structure of an atom?\nAnswer:", "choices": ["a lightweight core surrounded by neutral particles", "a massive core surrounded by negatively-charged particles", "a network of interacting positive and negative particles", "overlapping layers of neutral, positive, and negative particles"], "gold": 1, "gold_text": "a massive core surrounded by negatively-charged particles", "target": 1, "raw": {"question": "Which best describes the structure of an atom?"}}, {"context": "Question: To express the distance between the Milky Way galaxy and other galaxies, the most appropriate unit of measurement is the\nAnswer:", "choices": ["meter.", "kilometer.", "light-year.", "astronomical unit."], "gold": 2, "gold_text": "light-year.", "target": 2, "raw": {"question": "To express the distance between the Milky Way galaxy and other galaxies, the most appropriate unit of measurement is the"}}]}, {"name": "arc_challenge", "dataset": "allenai/ai2_arc \u00b7 ARC-Challenge", "output_type": "multiple_choice", "split": "test", "chance": 25.0, "blurb": "Grade-school science MC, filtered to questions that fooled simple retrieval/co-occurrence solvers.", "how_scored": "The model never generates. Each candidate is appended to the context and scored by length-normalized log-likelihood; the highest-scoring candidate is the model's answer. Accuracy = fraction where that argmax equals the gold choice.", "docs": [{"context": "Question: An astronomer observes that a planet rotates faster after a meteorite impact. Which is the most likely effect of this increase in rotation?\nAnswer:", "choices": ["Planetary density will decrease.", "Planetary years will become longer.", "Planetary days will become shorter.", "Planetary gravity will become stronger."], "gold": 2, "gold_text": "Planetary days will become shorter.", "target": 2, "raw": {"question": "An astronomer observes that a planet rotates faster after a meteorite impact. Which is the most likely effect of this increase in rotation?"}}, {"context": "Question: A group of engineers wanted to know how different building designs would respond during an earthquake. They made several models of buildings and tested each for its ability to withstand earthquake conditions. Which will most likely result from testing different building designs?\nAnswer:", "choices": ["buildings will be built faster", "buildings will be made safer", "building designs will look nicer", "building materials will be cheaper"], "gold": 1, "gold_text": "buildings will be made safer", "target": 1, "raw": {"question": "A group of engineers wanted to know how different building designs would respond during an earthquake. They made several models of buildings and tested each for its ability to withstand earthquake conditions. Which will most likely result from testing different building designs?"}}, {"context": "Question: The end result in the process of photosynthesis is the production of sugar and oxygen. Which step signals the beginning of photosynthesis?\nAnswer:", "choices": ["Chemical energy is absorbed through the roots.", "Light energy is converted to chemical energy.", "Chlorophyll in the leaf captures light energy.", "Sunlight is converted into chlorophyll."], "gold": 2, "gold_text": "Chlorophyll in the leaf captures light energy.", "target": 2, "raw": {"question": "The end result in the process of photosynthesis is the production of sugar and oxygen. Which step signals the beginning of photosynthesis?"}}, {"context": "Question: A physicist wants to determine the speed a car must reach to jump over a ramp. The physicist conducts three trials. In trials two and three, the speed of the car is increased by 20 miles per hour. What is the physicist investigating when he changes the speed?\nAnswer:", "choices": ["the control", "the hypothesis statement", "the dependent (responding) variable", "the independent (manipulated) variable"], "gold": 3, "gold_text": "the independent (manipulated) variable", "target": 3, "raw": {"question": "A physicist wants to determine the speed a car must reach to jump over a ramp. The physicist conducts three trials. In trials two and three, the speed of the car is increased by 20 miles per hour. What is the physicist investigating when he changes the speed?"}}, {"context": "Question: An astronaut drops a 1.0 kg object and a 5.0 kg object on the Moon. Both objects fall a total distance of 2.0 m vertically. Which of the following best describes the objects after they have fallen a distance of 1.0 m?\nAnswer:", "choices": ["They have each lost kinetic energy.", "They have each gained the same amount of potential energy.", "They have each lost the same amount of potential energy.", "They have each gained one-half of their maximum kinetic energy."], "gold": 3, "gold_text": "They have each gained one-half of their maximum kinetic energy.", "target": 3, "raw": {"question": "An astronaut drops a 1.0 kg object and a 5.0 kg object on the Moon. Both objects fall a total distance of 2.0 m vertically. Which of the following best describes the objects after they have fallen a distance of 1.0 m?"}}, {"context": "Question: Devil facial tumor disease (DFTD) is a disease that is decimating the population of Tasmanian devils. The disease passes from one animal to another through bites and is caused by parasites. The parasites cause cancerous tumors that spread throughout an infected animal's body and kill it. What is the best description of DFTD?\nAnswer:", "choices": ["a non-infectious, cell-cycle disease", "an infectious, cell-cycle disease", "a non-infectious, chronic disease", "an infectious, chronic disease"], "gold": 1, "gold_text": "an infectious, cell-cycle disease", "target": 1, "raw": {"question": "Devil facial tumor disease (DFTD) is a disease that is decimating the population of Tasmanian devils. The disease passes from one animal to another through bites and is caused by parasites. The parasites cause cancerous tumors that spread throughout an infected animal's body and kill it. What is the best description of DFTD?"}}]}, {"name": "sciq", "dataset": "allenai/sciq", "output_type": "multiple_choice", "split": "test", "chance": 25.0, "blurb": "Crowdsourced science exam questions; 3 distractors + 1 correct answer (support paragraph included).", "how_scored": "The model never generates. Each candidate is appended to the context and scored by length-normalized log-likelihood; the highest-scoring candidate is the model's answer. Accuracy = fraction where that argmax equals the gold choice.", "docs": [{"context": "Oxidants and Reductants Compounds that are capable of accepting electrons, such as O 2 or F2, are calledoxidants (or oxidizing agents) because they can oxidize other compounds. In t let ti = 0, di = 0;

function esc(s){return String(s).replace(/[&<>]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;'}[c]));}
const letter = i => String.fromCharCode(65+i);

function renderNav(){
  document.getElementById("nav").innerHTML = TASKS.map((t,i)=>`
    <button class="srcbtn ${i===ti?'active':''}" onclick="selectTask(${i})">
      <div class="t"><span>${esc(t.name)}</span>
        <span class="badge">${t.output_type==='multiple_choice'?'MC':'LL'}</span></div>
      <div class="repo">${esc(t.dataset)}</div>
    </button>`).join("");
}

function selectTask(i){ ti=i; di=0; render(); }
function nav(d){ const t=TASKS[ti]; di=Math.max(0,Math.min(t.docs.length-1,di+d)); render(); }

function renderCandidates(t, doc){
  if(t.name==='winogrande'){
    const opts = doc.choices.map((c,i)=>`
      <div class="cand ${i===doc.gold?'gold':''}">
        <div class="mark">${i===doc.gold?'✓ gold':letter(i)}</div>
        <div class="txt">fill blank with “${esc(c)}”</div>
      </div>`).join("");
    return `<div class="cands"><div class="lbl">Options for the blank (each scored as a full sentence)</div>${opts}</div>
      <div class="cont">Shared continuation scored after the blank: <code>${esc(doc.scored_continuation||'')}</code></div>`;
  }
  if(doc.choices){
    const opts = doc.choices.map((c,i)=>`
      <div class="cand ${i===doc.gold?'gold':''}">
        <div class="mark">${i===doc.gold?'✓ gold':letter(i)}</div>
        <div class="txt">${esc(c)}</div>
      </div>`).join("");
    return `<div class="cands"><div class="lbl">Candidate continuations (model picks the highest log-likelihood)</div>${opts}</div>`;
  }
  // loglikelihood (lambada): single target continuation
  return `<div class="target"><div class="lbl">Target — the word the model must predict</div>
    <span class="word">${esc(doc.gold_text||doc.target||'')}</span></div>`;
}

function render(){
  renderNav();
  const t = TASKS[ti], doc = t.docs[di];
  document.getElementById("topbar").innerHTML = `
    <h2>${esc(t.name)} <span class="badge">${esc(t.output_type)}</span></h2>
    <div class="repo">${esc(t.dataset)}</div>
    <div class="blurb">${esc(t.blurb||'')}</div>
    <div class="how">${esc(t.how_scored||'')}</div>
    <div class="facts">
      <span class="chip">split <b>${esc(t.split)}</b></span>
      <span class="chip">random baseline <b>${t.chance}%</b></span>
      ${doc.choices?`<span class="chip"><b>${doc.choices.length}</b> choices</span>`:''}
    </div>
    <div class="nav">
      <button onclick="nav(-1)" ${di===0?'disabled':''}>&larr; Prev</button>
      <span class="pos">${di+1} / ${t.docs.length}</span>
      <button onclick="nav(1)" ${di>=t.docs.length-1?'disabled':''}>Next &rarr;</button>
    </div>`;

  let ctx = esc(doc.context||'');
  if(t.name==='winogrande') ctx = ctx.replace('_', '<span class="blank">___</span>');
  document.getElementById("body").innerHTML = `
    <div class="lbl">Context — what the model reads</div>
    <div class="ctx">${ctx}</div>
    ${renderCandidates(t, doc)}`;
}
render();
</script>

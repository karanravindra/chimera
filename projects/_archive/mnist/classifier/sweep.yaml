program: projects/mnist/classifier/train.py
project: mnist-classifier
method: bayes
metric:
  name: val/acc
  goal: maximize
early_terminate:
  type: hyperband
  min_iter: 3
parameters:
  lr:
    distribution: log_uniform_values
    min: 0.0001
    max: 0.005
  batch-size:
    values: [64, 128, 256]
  warmup-steps:
    values: [50, 100, 200]
  model-variant:
    values: [tiny, small, medium, large]
command:
  - ${env}
  - ${interpreter}
  - ${program}
  - ${args}

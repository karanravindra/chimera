# AFHQ PetPaletteAE sweep.
#
# NOTE: train.py defaults to PHASE 1 ONLY (phases 2 & 3 are gated behind
# --phase2-epochs / --phase3-epochs, both default 0). Each trial therefore
# trains phase 1 (full model, L1+LPIPS @ 64x64) and reports ONE coherent wandb
# run. This sweep searches only phase-1 knobs, which matches that default:
#
#   SWEPT     : phase1-lr (log-uniform), lpips-weight, phase1-warmup-steps.
#               lpips-weight is the recipe's top rFID lever.
#   NOT SWEPT : epochs (fixed + the hard 10-min/run budget), batch size /
#               resolution (fixed; changing them shifts throughput and can blow
#               the time budget). To sweep the full curriculum instead, add
#               phase2-epochs / phase3-epochs (> 0) to the grid.
#
# Metric: val/rfid (reconstruction-FID, logged every validation epoch; lower is
# better) -- the key AE quality metric. Hyperband prunes weak configs early.
program: projects/afhq/autoencoder/train.py
project: afhq-autoencoder
method: bayes
metric:
  name: val/rfid
  goal: minimize
early_terminate:
  type: hyperband
  min_iter: 2
parameters:
  phase1-lr:
    distribution: log_uniform_values
    min: 0.0001
    max: 0.002
  lpips-weight:
    values: [0.5, 1.0, 2.0]
  phase1-warmup-steps:
    values: [100, 200, 300]
command:
  - ${env}
  - ${interpreter}
  - ${program}
  - ${args}

# adamw-lr upper-bracket extension on the emb48 proxy. The main emb48 sweep
# (sweep_mup.yaml) found adamw-lr=1e-3 best, but it sat at the TOP edge of the
# grid {2.5e-4, 5e-4, 1e-3} — an unbracketed optimum. This extends the adamw axis
# upward at the winning muon-lr (0.01) to find where it actually peaks.
#
# Matches the main sweep exactly (arch 48-2-1-3, 5000 steps, constant LR, default
# val-check-interval=500 / limit-val-batches=250) so val/loss is directly
# comparable to the existing 1e-3 result (5.3313). Only the 2 NEW points run;
# 1e-3 is the known anchor. emb48 is tiny (~5 min/run) -> ~10 min total.
#
#   wandb sweep projects/fineweb-edu/gpt/sweep_mup_ext.yaml
#   wandb agent <entity>/fineweb-edu-gpt/<sweep_id>
program: projects/fineweb-edu/gpt/train.py
project: fineweb-edu-gpt
method: grid
metric:
  name: val/loss
  goal: minimize
parameters:
  arch:
    value: "48-2-1-3"
  muon-lr:
    value: 0.01
  adamw-lr:
    values: [0.002, 0.004]
  max-steps:
    value: 5000
  max-train-tokens:
    value: 1000000000
command:
  - ${env}
  - ${interpreter}
  - ${program}
  - --no-scheduler
  - ${args}

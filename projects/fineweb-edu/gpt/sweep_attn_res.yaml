# Grid sweep over Attention Residuals (MoonshotAI) block granularity, ranking
# on val/loss. --use-attn-res is fixed on for the whole sweep (baked into
# `command`, same trick as sweep_mup.yaml's --no-scheduler) since a boolean
# store_true flag can't be swept via `parameters` — wandb would pass
# "--use-attn-res False", which argparse's store_true rejects. Compare against
# a SEPARATE single off-baseline run at the same arch/steps (run directly via
# train.py, not through this sweep) instead of duplicating it once per
# n-blocks value here.
#
# arch is "48-2-1-8": same emb48 muP proxy width as sweep_mup.yaml, bumped to
# n_layer=8 so attn-res-n-blocks has multiple valid divisors (1, 2, 4, 8).
# n_blocks == n_layer (8) is Full AttnRes; smaller values are Block AttnRes.
#
#   wandb sweep projects/fineweb-edu/gpt/sweep_attn_res.yaml
#   wandb agent <entity>/fineweb-edu-gpt/<sweep_id>
program: projects/fineweb-edu/gpt/train.py
project: fineweb-edu-gpt
method: grid
metric:
  name: val/loss
  goal: minimize
parameters:
  arch:
    value: "48-2-1-8"
  attn-res-n-blocks:
    values: [8, 4, 2, 1]
  max-steps:
    value: 5000
  val-check-interval:
    value: 1000
  limit-val-batches:
    value: 100
  tags:
    value: "attn-res-sweep-5k"
command:
  - ${env}
  - ${interpreter}
  - ${program}
  - --use-attn-res
  - --no-test
  - --no-eval
  - ${args}

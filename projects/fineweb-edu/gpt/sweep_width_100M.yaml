# muP width-transfer scan at a fixed 100M-token budget (1526 steps x 65536
# tokens/step). LRs are NOT swept: muon 0.01 / adamw 4e-3 transferred from the
# emb48 proxy sweep (muP: Muon is spectrally normalized, AdamW params are
# width-independent), so val/loss vs width isolates what width alone buys.
#
# Widths 48 -> 384 in steps of 48, head_dim fixed at 24 (the muTransfer
# invariant): n_head = width/24, n_kv_head = n_head/2, depth fixed at 3.
# arch is ONE coupled "n_embd-n_head-n_kv_head-n_layer" grid param because the
# dims are not independent (a grid over each would produce invalid combos).
# Ascending width order: the cheap runs land first for early signal.
#
# Scheduler stays ON (warmup + cosine annealed over max-steps): this is a
# best-effort-at-budget comparison, not an LR ablation. --no-test/--no-eval:
# runs are ranked on periodic val/loss.
#
#   wandb sweep projects/fineweb-edu/gpt/sweep_width_100M.yaml
#   wandb agent <entity>/fineweb-edu-gpt/<sweep_id>
program: projects/fineweb-edu/gpt/train.py
project: fineweb-edu-gpt
method: grid
metric:
  name: val/loss
  goal: minimize
parameters:
  arch:
    values:
      - "48-2-1-3"
      - "96-4-2-3"
      - "144-6-3-3"
      - "192-8-4-3"
      - "240-10-5-3"
      - "288-12-6-3"
      - "336-14-7-3"
      - "384-16-8-3"
  max-steps:
    value: 1526
  max-train-tokens:
    value: 1000000000
  tags:
    value: "width-sweep-100M"
command:
  - ${env}
  - ${interpreter}
  - ${program}
  - --no-test
  - --no-eval
  - ${args}

# Hypothesis probe: is the emb48 "high AdamW / low Muon" LR regime an artifact
# of the vocab:backbone parameter ratio? emb48 is 40.7:1 AdamW:Muon (the 64k-row
# embedding/head table dwarfs the tiny backbone). This GPT-2-124M-class config
# (arch 768-12-3-12) flips that to 0.67:1 (backbone-dominated) — a ~60x swing.
#
# Same 3x3 muon-lr x adamw-lr grid as the emb48 sweep (sweep_mup.yaml) so the
# argmin is directly comparable. If the optimum stays pinned at high adamw / low
# muon, the regime is intrinsic; if it moves interior, it was the vocab ratio.
#
# Short budget (200 steps): the emb48 runs showed the val/loss LR ranking is
# LOCKED by the first validation point and never reorders, and the grid gaps are
# large + monotonic — so 200 steps ranks LRs at ~4 min/run (whole 9-run grid in
# ~35 min on one 16 GB GPU). --grad-checkpoint fits 124M @ seq 2048; --no-test
# skips the redundant end-of-run test pass. NO scheduler => constant LR, so the
# sweep selects an LR *value*, not a schedule. Val @100 & @200 (two points) also
# confirm the ranking is stable, not an undertraining fluke.
#
#   wandb sweep projects/fineweb-edu/gpt/sweep_mup_124m.yaml
#   wandb agent <entity>/fineweb-edu-gpt/<sweep_id>
program: projects/fineweb-edu/gpt/train.py
project: fineweb-edu-gpt
method: grid
metric:
  name: val/loss
  goal: minimize
parameters:
  arch:
    value: "768-12-3-12"
  muon-lr:
    values: [0.01, 0.02, 0.04]
  adamw-lr:
    values: [0.00025, 0.0005, 0.001]
  max-steps:
    value: 200
  val-check-interval:
    value: 100
  max-train-tokens:
    value: 1000000000
  limit-val-batches:
    value: 64
command:
  - ${env}
  - ${interpreter}
  - ${program}
  - --no-scheduler
  - --grad-checkpoint
  - --no-test
  - ${args}

program: projects/cifar10/classify/train.py
project: cifar10-classifier
method: bayes
metric:
  name: val/acc
  goal: maximize
early_terminate:
  type: hyperband
  min_iter: 9
parameters:
  lr:
    distribution: log_uniform_values
    min: 0.0001
    max: 0.005
  batch-size:
    values: [64, 128, 256]
  warmup-steps:
    values: [50, 100, 200]
  weight-decay:
    values: [0.0001, 0.0005, 0.001]
command:
  - ${env}
  - ${interpreter}
  - ${program}
  - ${args}

[project]
name = "chimera"
version = "0.1.0"
description = "Add your description here"
readme = "README.md"
authors = [
    { name = "karan", email = "you@example.com" }
]
requires-python = ">=3.12"
dependencies = [
    "torch>=2.12.0",
    "torchvision>=0.27.0",
    "lightning>=2.6.5",
    "numpy",
    "pillow",
    "tiktoken>=0.13.0",
    "datasets>=5.0.0",
    "tqdm>=4.68.2",
    "torchinfo>=1.8.0",
    "torchmetrics>=1.9.0",
    "wandb>=0.21.0",
    "matplotlib>=3.9",
    "torch-fidelity>=0.4.0",
    "scipy>=1.18.0",
]

[project.scripts]
chimera = "chimera:main"

[build-system]
requires = ["uv_build>=0.9.16,<0.10.0"]
build-backend = "uv_build"
